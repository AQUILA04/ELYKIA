version: '3.8'

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-elykia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strong_prod_password}
      POSTGRES_DB: ${POSTGRES_DB:-elykia_db}
    volumes:
      - db_data:/var/lib/postgresql/data
    # Ne publie pas le port 5432 publiquement en prod par défaut
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://db:5432/${POSTGRES_DB}}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
    deploy:
      restart_policy:
        condition: on-failure

# In production, we do NOT publish the frontend port on the host. A reverse-proxy (nginx) on the host
# will route TLS traffic to the containers. This improves security and allows certbot to manage HTTPS.
  frontend:
    image: ${FRONTEND_IMAGE}
    restart: unless-stopped
    # Do not bind port 80 on the host in prod; let nginx handle external traffic

volumes:
  db_data:

