version: '3.8'

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-elykia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-elykia_pwd}
      POSTGRES_DB: ${POSTGRES_DB:-elykia_db}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432" # accessible for test environment
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    depends_on:
      - db
    environment:
      # Variables communes — adaptez selon votre application (Spring Boot, etc.)
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://db:5432/${POSTGRES_DB}}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      # Fix: user.home inside the container resolves to /root (Alpine default) but the
      # process runs as 'app' which has no write access to /root. We override the
      # logging path and app folder explicitly so they point to the app user's home.
      # logging.file.path → LOGGING_FILE_PATH (Spring Boot relaxed binding: dots→underscores, uppercase)
      LOGGING_FILE_PATH: /home/app/.optimize-elykia-core/logs
    ports:
      # bind backend only on localhost so host reverse-proxy (nginx) can reach it
      - "127.0.0.1:8080:8080"

  frontend:
    image: ${FRONTEND_IMAGE}
    restart: unless-stopped
    ports:
      # bind frontend on localhost (different port) so nginx on the host can proxy to it
      - "127.0.0.1:8081:80"
    volumes:
      - /opt/elykia/assets/env.js:/usr/share/nginx/html/assets/js/env.js:ro

volumes:
  db_data:

