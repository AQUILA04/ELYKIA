# TEST stack — project name: elykia-test
# Domain: elykia-test.amenouveve-yaveh.com
# Start:  docker compose -f docker-compose.test.yml --project-name elykia-test up -d
# Stop:   docker compose -f docker-compose.test.yml --project-name elykia-test down

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-elykia_test}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-elykia_test_pwd}
      POSTGRES_DB: ${POSTGRES_DB:-elykia_test_db}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - internal

  backend:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://db:5432/${POSTGRES_DB}}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      LOGGING_FILE_PATH: /home/app/.optimize-elykia-core/logs
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRINGDOC_SWAGGER_UI_DISABLE_SWAGGER_DEFAULT_URL: "true"
      SERVER_PORT: ${SERVER_PORT:-8080}
      LOKI_API_KEY: ${LOKI_API_KEY:-}
      SPRING_FLYWAY_ENABLED: ${SPRING_FLYWAY_ENABLED:-false}
    volumes:
      - ${LOG_PATH:-/opt/elykia/test/logs}:/home/app/.optimize-elykia-core/logs
    networks:
      - internal
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      # HTTPS router — higher priority (10) than frontend (1) so /api routes hit backend first
      # stripprefix removes /api before forwarding to Spring Boot (backend uses /actuator, not /api/actuator)
      - "traefik.http.routers.elykia-test-backend.rule=Host(`elykia-test.amenouveve-yaveh.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.elykia-test-backend.entrypoints=websecure"
      - "traefik.http.routers.elykia-test-backend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.elykia-test-backend.priority=10"
      - "traefik.http.routers.elykia-test-backend.middlewares=elykia-test-strip-api"
      - "traefik.http.middlewares.elykia-test-strip-api.stripprefix.prefixes=/api"
      - "traefik.http.services.elykia-test-backend.loadbalancer.server.port=${SERVER_PORT:-8080}"

  frontend:
    image: ${FRONTEND_IMAGE}
    restart: unless-stopped
    environment:
      API_URL: ${API_URL:-https://elykia-test.amenouveve-yaveh.com/api}
      GA_MEASUREMENT_ID: ${GA_MEASUREMENT_ID:-}
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      # HTTPS router — lower priority (1), catches all remaining traffic
      - "traefik.http.routers.elykia-test-frontend.rule=Host(`elykia-test.amenouveve-yaveh.com`)"
      - "traefik.http.routers.elykia-test-frontend.entrypoints=websecure"
      - "traefik.http.routers.elykia-test-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.elykia-test-frontend.priority=1"
      - "traefik.http.services.elykia-test-frontend.loadbalancer.server.port=80"

volumes:
  db_data:

networks:
  internal:
    # Internal network: only db ↔ backend communicate here
  traefik-public:
    external: true
