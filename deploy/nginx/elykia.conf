server {
    # Make this the default server so accessing the server by IP (or unknown Host)
    # will still serve the frontend instead of the default nginx page.
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Basic HTTP proxy (used when no TLS certificate exists yet).
    # certbot will later modify nginx config to enable HTTPS automatically.

    # Frontend: proxy to container (frontend bound to localhost:8081)
    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API proxied to backend
    location /api/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional: adjust timeouts for long requests
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
}

# NOTE:
# - This template provides an HTTP-only server so nginx can start without TLS.
# - After this is installed, run certbot (or let setup_nginx.sh run it) to obtain
#   certificates; certbot will update nginx config to enable HTTPS and redirects.

