<h2 mat-dialog-title>Nouveau Versement</h2>
<mat-dialog-content>
    <div class="info-block mb-3">
        <p><strong>Commercial:</strong> {{ commercialUsername }}</p>
        <p><strong>Reste à verser:</strong> {{ remainingAmount | currency:'XOF':'symbol':'1.0-0' }}</p>
    </div>

    <app-billetage (billetageData)="onBilletageChange($event)"></app-billetage>

    <div class="mt-3 text-end" *ngIf="depositAmount > 0">
        <h3>Total Saisi: {{ depositAmount | currency:'XOF':'symbol':'1.0-0' }}</h3>
        <p class="text-danger" *ngIf="depositAmount > remainingAmount">
            Attention: Le montant saisi dépasse le reste à verser.
        </p>
    </div>

</mat-dialog-content>
<mat-dialog-actions align="end">
    <button mat-button mat-dialog-close>Annuler</button>
    <button mat-raised-button color="primary" [disabled]="depositAmount <= 0 || isSubmitting" (click)="submitDeposit()">
        Valider le Versement
    </button>
</mat-dialog-actions>
