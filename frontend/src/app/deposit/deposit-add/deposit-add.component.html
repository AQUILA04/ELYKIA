<ngx-spinner bdColor="rgba(51,51,51,0.8)" size="medium" color="#fff" type="ball-scale-multiple"></ngx-spinner>

<div class="container">
  <div class="form-header">
    <h1>Ajouter un dépôt</h1>
  </div>
  <form [formGroup]="depositForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="agencyId">Agence <span class="text-danger">*</span></label>
      <mat-select formControlName="agencyId" class="form-control">
        <mat-option *ngFor="let agency of agencies" [value]="agency.id">
          {{ agency.name }}
        </mat-option>
      </mat-select>
      <mat-error *ngIf="depositForm.get('agencyId')?.invalid && depositForm.get('agencyId')?.touched">
        L'agence est requise.
      </mat-error>
    </div>
    <div class="form-group">
      <label for="totalAmount">Montant total <span class="text-danger">*</span></label>
      <input id="totalAmount" formControlName="totalAmount" type="number" class="form-control" />
      <mat-error *ngIf="depositForm.get('totalAmount')?.invalid && depositForm.get('totalAmount')?.touched">
        Le montant total est requis.
      </mat-error>
    </div>
    <div class="form-group">
      <label for="depositStatus">Statut du dépôt <span class="text-danger">*</span></label>
      <mat-select formControlName="depositStatus" class="form-control">
        <mat-option value="NORMAL">Normal</mat-option>
        <mat-option value="SURPLUS">Surplus</mat-option>
        <mat-option value="MANQUANT">Manquant</mat-option>
      </mat-select>
      <mat-error *ngIf="depositForm.get('depositStatus')?.invalid && depositForm.get('depositStatus')?.touched">
        Le statut du dépôt est requis.
      </mat-error>
    </div>    
    <div class="form-group">
      <label for="irregularityAmount">Montant d'irregularité</label>
      <input id="irregularityAmount" formControlName="irregularityAmount" type="number" class="form-control" />
    </div>
    <div class="form-group">
      <label for="balance">Solde <span class="text-danger">*</span></label>
      <input id="balance" formControlName="balance" type="number" class="form-control" />
      <mat-error *ngIf="depositForm.get('balance')?.invalid && depositForm.get('balance')?.touched">
        Le solde est requis.
      </mat-error>
    </div>
    <div class="actions">
      <button type="button" class="btn btn-cancel" (click)="onCancel()">Annuler</button>
      <button type="submit" class="btn btn-submit" [disabled]="depositForm.invalid">Valider</button>
    </div>
  </form>
</div>
