<ngx-spinner bdColor="rgba(51,51,51,0.8)" size="medium" color="#fff" type="ball-scale-multiple"></ngx-spinner>

<div class="container">
  <div class="header-fixed">
    <div class="d-flex justify-content-center">
      <h1>Liste des dépôts de la semaine</h1>
    </div>
  </div>

  <div class="d-flex justify-content-end mb-3">
    <button class="btn refresh-button btn-sm" (click)="refresh()">
      <mat-icon>refresh</mat-icon>
      <span>Rafraîchir</span>
    </button>
    &nbsp;
    <button class="btn add btn-sm" (click)="addDeposit()">
      <mat-icon>add</mat-icon>
      <span>Nouveau dépôt</span>
    </button>
  </div>

  <div class="table-container">
    <table class="article-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Nom de l'agence</th>
          <th>Montant total</th>
          <th>Status du dépôt</th>
          <th>Montant d'irregularité</th>
          <th>Solde</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let deposit of deposits; let i = index">
          <td>{{ (currentPage * pageSize) + (i + 1) }}</td>
          <td>{{ deposit.agencyName }}</td>
          <td>{{ deposit.collection }}</td>
          <td>{{ deposit.spending }}</td>
          <td>{{ deposit.balance }}</td>
          <td>
            <button mat-icon-button matTooltip="Détails" (click)="viewDetails(deposit.id)">
              <mat-icon>visibility</mat-icon>
            </button>
            <button mat-icon-button matTooltip="Modifier" (click)="editDeposit(deposit.id)">
              <mat-icon style="color: #003366;">edit</mat-icon>
            </button>
            <button mat-icon-button matTooltip="Supprimer" (click)="deleteDeposit(deposit.id)">
              <mat-icon style="color: #c90a17;">delete</mat-icon>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <mat-paginator
    [length]="totalElement"
    [pageSize]="pageSize"
    [pageSizeOptions]="[5, 10, 25, 100]"
    (page)="onPageChange($event)"
  ></mat-paginator>
</div>
