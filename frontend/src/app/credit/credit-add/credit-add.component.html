<ngx-spinner bdColor="rgba(51,51,51,0.8)" size="medium" color="#fff" type="ball-scale-multiple"></ngx-spinner>

<div class="container">
  <div class="form-header">
    <h1>{{ creditId ? 'Modifier une vente' : 'Ajouter une vente' }}</h1>
  </div>

  <form [formGroup]="creditForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="clientId">Client<span class="text-danger">*</span></label>
      <ng-select
        id="clientId"
        formControlName="clientId"
        [items]="clients"
        bindLabel="firstname"
        bindValue="id"
        [searchFn]="searchClient"
        placeholder="Rechercher et sélectionner un client"
        notFoundText="Aucun client trouvé">
        <ng-template ng-label-tmp let-item="item">
          {{ item.firstname }} {{ item.lastname }}
        </ng-template>
        <ng-template ng-option-tmp let-item="item">
          <div>{{ item.firstname }} {{ item.lastname }}</div>
        </ng-template>
      </ng-select>
      <mat-error *ngIf="creditForm.get('clientId')?.invalid && creditForm.get('clientId')?.touched">
        Le client est requis.
      </mat-error>
    </div>

    <div class="form-group">
      <label for="advance">Avance (Optionnel)</label>
      <input id="advance" type="number" formControlName="advance" class="form-control" />
      <mat-error *ngIf="creditForm.get('advance')?.invalid && creditForm.get('advance')?.touched">
        L'avance doit être un nombre positif.
      </mat-error>
    </div>

    <!-- Utilisation du nouveau composant réutilisable -->
    <div class="form-group">
      <label>Articles<span class="text-danger">*</span></label>
      <app-article-selector
        formControlName="articles"
        [articles]="articles"
        [priceType]="'credit'"
        [showPrices]="true"
        [showStock]="true"
        (totalAmountChange)="onTotalAmountChange($event)"
        [validateStock]="true">
      </app-article-selector>
      <mat-error *ngIf="creditForm.get('articles')?.invalid && creditForm.get('articles')?.touched">
        Au moins un article doit être sélectionné.
      </mat-error>
    </div>

    <div class="actions">
      <button type="button" class="btn btn-cancel" (click)="onCancel()" [disabled]="isLoading">
        Annuler
      </button>
      <button type="submit" class="btn btn-submit" [disabled]="creditForm.invalid || isLoading">
        {{ isLoading ? 'En cours...' : 'Valider' }}
      </button>
    </div>
  </form>
</div>
