<!-- ═══════════════════════════════════════════════════════════════
     credit-echeance.component.html  —  composant racine
     ═══════════════════════════════════════════════════════════════ -->
<div class="main-container a1">

  <!-- BREADCRUMB -->
  <div class="breadcrumb-bar">
    <a routerLink="/home" class="breadcrumb-link">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M11.78 5.22a.75.75 0 0 1 0 1.06L8.06 10l3.72 3.72a.75.75 0 1 1-1.06 1.06l-4.25-4.25a.75.75 0 0 1 0-1.06l4.25-4.25a.75.75 0 0 1 1.06 0Z" clip-rule="evenodd" />
      </svg>
      Tableau de bord
    </a>
    <span class="date-display">{{ currentDate | date:'dd/MM/yyyy - HH:mm:ss' }}</span>
  </div>

  <!-- HEADER -->
  <div class="page-header-card">
    <div class="header-card-top">
      <span class="header-surtitle">GESTION DES ÉCHÉANCES</span>
      <span class="last-update">Actualisation : {{ lastUpdate | date:'HH:mm:ss' }}</span>
    </div>
    <div class="header-card-main">
      <div class="title-group">
        <svg class="calendar-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             style="display:block;flex-shrink:0">
          <path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
        <h1 class="page-title" style="margin:0;padding:0;line-height:1">Crédits à échéance</h1>
      </div>
      <button class="btn-refresh" (click)="loadData()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 109-9 9.75 9.75 0 00-6.74 2.74L3 8"/>
          <path d="M3 3v5h5"/>
        </svg>
        Actualiser
      </button>
    </div>
    <p class="page-subtitle">Crédits arrivant à terme · Vue par jour ou par semaine</p>
  </div>

  <!-- KPI -->
  <app-credit-echeance-kpi
    [totalToday]="summary.totalToday"
    [totalWeek]="summary.totalWeek"
    [totalUnsettled]="summary.totalUnsettled"
    [totalAmountRemaining]="summary.totalAmountRemaining">
  </app-credit-echeance-kpi>

  <!-- CALENDRIER SEMAINE -->
  <app-credit-echeance-calendar
    [credits]="allCredits"
    [selectedPeriod]="selectedPeriod"
    [selectedDate]="selectedDate"
    [collector]="selectedCollector"
    (daySelected)="onDaySelected($event)">
  </app-credit-echeance-calendar>

  <!-- FILTRE -->
  <app-credit-echeance-filter
    [resultCount]="filteredCredits.length"
    [selectedPeriod]="selectedPeriod"
    [selectedDate]="selectedDate"
    (periodChanged)="onPeriodChanged($event)"
    (dateChanged)="onDateChanged($event)"
    (commercialChanged)="onCommercialChanged($event)">
  </app-credit-echeance-filter>

  <!-- TABLE -->
  <app-credit-echeance-table
    [credits]="filteredCredits"
    [isLoading]="isLoading">
  </app-credit-echeance-table>

</div>
