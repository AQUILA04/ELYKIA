<div class="main-container a1">
  <div class="breadcrumb-bar">
    <a routerLink="/dashboard" class="breadcrumb-link">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M11.78 5.22a.75.75 0 0 1 0 1.06L8.06 10l3.72 3.72a.75.75 0 1 1-1.06 1.06l-4.25-4.25a.75.75 0 0 1 0-1.06l4.25-4.25a.75.75 0 0 1 1.06 0Z" clip-rule="evenodd" />
      </svg>
      Tableau de bord
    </a>
    <span class="date-display">{{ currentDate | date:'dd/MM/yyyy - HH:mm:ss' }}</span>
  </div>

  <div class="page-header-card">
    <div class="header-card-top">
      <span class="header-surtitle">GESTION DES RISQUES</span>
      <span class="last-update">Actualisation : {{ lastUpdate | date:'HH:mm:ss' }}</span>
    </div>

    <div class="header-card-main">
      <div class="title-group">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="alert-icon" style="display:block;flex-shrink:0"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
        <h1 class="page-title" style="margin:0;padding:0;line-height:1">Crédits en retard</h1>
      </div>
      <button class="btn-refresh" (click)="loadData()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        Actualiser
      </button>
    </div>
    <p class="page-subtitle">Classés du plus grave au plus mineur · Mis à jour en temps réel</p>
  </div>

  <app-credit-late-kpi
    [totalLate]="summary.totalLate"
    [totalDelai]="summary.totalDelai"
    [totalEcheance]="summary.totalEcheance"
    [totalAmountRemaining]="summary.totalAmountRemaining">
  </app-credit-late-kpi>

  <app-credit-late-filter
    [resultCount]="filteredCredits.length"
    (typeChanged)="onTypeChanged($event)"
    (commercialChanged)="onCommercialChanged($event)">
  </app-credit-late-filter>

  <app-credit-late-table
    [credits]="filteredCredits"
    [isLoading]="isLoading">
  </app-credit-late-table>
</div>
