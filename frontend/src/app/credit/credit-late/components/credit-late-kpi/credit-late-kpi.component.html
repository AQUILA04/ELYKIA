<div class="kpi-strip a3">
  <div class="kpi-card kpi-total">
    <div class="kpi-label">Total en retard</div>
    <div class="kpi-value">{{ totalLate }}</div>
    <div class="kpi-sub">crédits actifs</div>
  </div>
  <div class="kpi-card kpi-delai">
    <div class="kpi-label">Retard délai</div>
    <div class="kpi-value">{{ totalDelai }}</div>
    <div class="kpi-sub">date fin dépassée</div>
  </div>
  <div class="kpi-card kpi-echeance">
    <div class="kpi-label">Retard échéance</div>
    <div class="kpi-value">{{ totalEcheance }}</div>
    <div class="kpi-sub">paiements en souffrance</div>
  </div>
  <div class="kpi-card kpi-amount">
    <div class="kpi-label">Montant total dû</div>
    <div class="kpi-value">{{ totalAmountRemaining | number }}</div>
    <div class="kpi-sub">FCFA (restants)</div>
  </div>
</div>
