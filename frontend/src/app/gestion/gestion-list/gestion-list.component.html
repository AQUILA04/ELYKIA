<ngx-spinner bdColor="rgba(51,51,51,0.8)" size="medium" color="#fff" type="ball-scale-multiple"></ngx-spinner>
<div class="container">
<div class="header-fixed">
  <div class="d-flex justify-content-center">
    <h1>Liste des agences</h1>
  </div>
</div>
    <div class="d-flex justify-content-end">
      <button class="btn refresh-button btn-sm" (click)="refresh()">
        <mat-icon>refresh</mat-icon>
        <span>Rafraîchir</span>
      </button>
      &nbsp;
      <button  class="btn add btn-sm" (click)="addGestion()">
        <mat-icon>add</mat-icon>
        <span>Ajouter</span>
      </button>
    </div>
    
    <div class="table-container">
        <table class="article-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Nom</th>
              <th>Code</th>
              <th>Contact</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let gestion of this.gestions; let i = index">
              <td>{{(currentPage * pageSize) + (i + 1)}}</td>
              <td>{{gestion.name}}</td>
              <td>{{gestion.code}}</td>
              <td>{{gestion.phone}}</td>
              <td>
                <button mat-icon-button matTooltip="Détails" (click)="viewDetails(gestion.id)">
                  <mat-icon>visibility</mat-icon>
                </button>
                <button  mat-icon-button matTooltip="Modifier" (click)="editGestion(gestion.id)">
                  <mat-icon style="color: #003366;">edit</mat-icon>
                </button>
                <button  mat-icon-button matTooltip="Supprimer" (click)="deleteGestion(gestion.id)">
                  <mat-icon style="color: #c90a17;">delete</mat-icon>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <mat-paginator [length]="totalElement" [pageSize]="pageSize" [pageSizeOptions]="[5, 10, 25, 100]" (page)="onPageChange($event)">
      </mat-paginator>
</div>
