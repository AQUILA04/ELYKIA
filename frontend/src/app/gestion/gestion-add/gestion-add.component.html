<div class="container">
    <div class="form-header">
      <h1>Editer une agence</h1>
    </div>
    <form [formGroup]="agencyForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="name">Nom <span class="text-danger">*</span></label>
        <input id="name" formControlName="name" class="form-control" />
        <mat-error *ngIf="agencyForm.get('name')?.invalid && agencyForm.get('name')?.touched">
          Le nom est requis.
        </mat-error>
      </div>
      <div class="form-group">
        <label for="code">Code </label>
        <input id="code" formControlName="code" class="form-control" />
        <mat-error *ngIf="agencyForm.get('code')?.invalid && agencyForm.get('code')?.touched">
          Le code est requis.
        </mat-error>
      </div>
      <div class="form-group">
        <label for="phone">Téléphone <span class="text-danger">*</span></label>
        <input id="phone" formControlName="phone" class="form-control" />
        <mat-error *ngIf="agencyForm.get('phone')?.invalid && agencyForm.get('phone')?.touched">
          Le téléphone est requis.
        </mat-error>
      </div>
      <div class="form-group">
        <label for="secretaryName">Nom de la secretaire:</label>
        <input id="secretaryName" formControlName="secretaryName" class="form-control" />
      </div>
      <div class="form-group">
        <label for="secretaryContact">Numero de la sécretaire:</label>
        <input id="secretaryContact" formControlName="secretaryContact" class="form-control" />
      </div>
      <div class="form-group">
        <label for="superviserName">Nom du superviseur:</label>
        <input id="superviserName" formControlName="superviserName" class="form-control" />
      </div>
      <div class="form-group">
        <label for="superviserContact">Numero du superviseur:</label>
        <input id="superviserContact" formControlName="superviserContact" class="form-control" />
      </div>
      <div class="actions">
        <button type="button" class="btn btn-cancel" (click)="onCancel()">Annuler</button>
        <button type="submit" class="btn btn-submit" [disabled]="agencyForm.invalid">Enregistrer</button>
      </div>
    </form>
  </div>
