<ngx-spinner bdColor="rgba(51,51,51,0.8)" size="medium" color="#fff" type="ball-scale-multiple"></ngx-spinner>
<div class="container">
  <div class="header-fixed">
    <div class="d-flex justify-content-center">
      <app-breadcrumb></app-breadcrumb>
      <h1>Liste des Paramètres</h1>
    </div>
  </div>

  <div class="d-flex justify-content-between align-items-center mb-3">
    <div class="button-group ml-auto">
      <button class="btn refresh-button btn-sm" (click)="refresh()">
        <mat-icon>refresh</mat-icon>
        <span>Rafraîchir</span>
      </button>
      &nbsp;
      <button class="btn add btn-sm" (click)="addParameter()">
        <mat-icon>add</mat-icon>
        <span>Ajouter</span>
      </button>
    </div>
  </div>

  <div class="table-container">
    <table class="article-table">
      <thead>
      <tr>
        <th>#</th>
        <th>Clé</th>
        <th>Valeur</th>
        <th>Description</th>
        <th style="text-align: right;">Action</th>
      </tr>
      </thead>
      <tbody>
      <tr *ngFor="let param of parameters; let i = index">
        <td>{{ (currentPage * pageSize) + (i + 1) }}</td>
        <td>{{ param.key }}</td>
        <td>
          <span *ngIf="isBoolean(param.value)" class="badge" [ngClass]="{'bg-success': param.value === 'true', 'bg-danger': param.value === 'false'}">
            {{ formatValue(param.value) }}
          </span>
          <span *ngIf="!isBoolean(param.value)">{{ param.value }}</span>
        </td>
        <td>{{ param.description }}</td>
        <td>
          <div style="display: flex; justify-content: flex-end;">
            <button mat-icon-button matTooltip="Modifier" (click)="editParameter(param)">
              <mat-icon style="color: #003366;">edit</mat-icon>
            </button>
            <button mat-icon-button matTooltip="Supprimer" (click)="deleteParameter(param.id)">
              <mat-icon style="color: #c90a17;">delete</mat-icon>
            </button>
          </div>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
  <mat-paginator [length]="totalElements" [pageSize]="pageSize" [pageSizeOptions]="[5, 10, 25, 100]" (page)="onPageChange($event)">
  </mat-paginator>
</div>
