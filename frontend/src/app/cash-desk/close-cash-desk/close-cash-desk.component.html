<div class="container">
    <div class="h1">
      <h1>Gestion de la caisse</h1>
    </div>
    <div class="form-group">
      <div class="action-row">
        <label>Fermer la caisse pour l'utilisateur : <span class="username">{{ username }}</span></label>
        <button class="btn btn-primary action-button" (click)="closeCashDesk()" [disabled]="isLoading">
          Fermer Caisse
        </button>
      </div>
    </div>
  </div>
