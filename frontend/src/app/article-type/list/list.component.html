<ngx-spinner bdColor="rgba(51,51,51,0.8)" size="medium" color="#fff" type="ball-scale-multiple"></ngx-spinner>
<div class="container">
    <div class="header-fixed">
        <div class="d-flex justify-content-center">
            <h1>Liste des types d'article</h1>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <input type="text" placeholder="Rechercher un type..." [(ngModel)]="search" (input)="onSearch()"
            class="form-control w-50" />

        <div class="button-group">
            <button class="btn refresh-button btn-sm" (click)="getList()">
                <mat-icon>refresh</mat-icon>
                <span>Rafraîchir</span>
            </button>
            <button class="btn add btn-sm" routerLink="add">
                <mat-icon>add</mat-icon>
                <span>Ajouter</span>
            </button>
        </div>
    </div>

    <div class="table-container">
        <table class="article-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nom</th>
                    <th>Code</th>
                    <th>Description</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let type of types">
                    <td>{{ type.id }}</td>
                    <td>{{ type.name }}</td>
                    <td>{{ type.code }}</td>
                    <td>{{ type.description }}</td>
                    <td>
                        <button mat-icon-button matTooltip="Modifier" [routerLink]="['edit', type.id]">
                            <mat-icon style="color: #003366;">edit</mat-icon>
                        </button>
                        <button mat-icon-button matTooltip="Supprimer" (click)="onDelete(type.id!)">
                            <mat-icon style="color: #c90a17;">delete</mat-icon>
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <mat-paginator [length]="totalElements" [pageSize]="size" [pageSizeOptions]="[5, 10, 25, 100]"
        (page)="onPageChange($event)">
    </mat-paginator>
</div>
