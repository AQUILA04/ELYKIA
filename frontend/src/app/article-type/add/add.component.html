<div class="container">
    <div class="form-header">
        <h1>{{ isEditMode ? 'Editer' : 'Créer' }} un Type d'Article</h1>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">

        <div class="form-group">
            <label for="name">Nom <span class="text-danger">*</span></label>
            <input type="text" id="name" formControlName="name" class="form-control"
                [class.is-invalid]="form.get('name')?.invalid && form.get('name')?.touched">
            <div class="mat-error" *ngIf="form.get('name')?.invalid && form.get('name')?.touched">
                Le nom est requis.
            </div>
        </div>

        <div class="form-group">
            <label for="code">Code <span class="text-danger">*</span></label>
            <input type="text" id="code" formControlName="code" class="form-control">
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" formControlName="description" class="form-control" rows="3"></textarea>
        </div>

        <div class="actions">
            <button type="button" class="btn btn-cancel" (click)="onCancel()">Annuler</button>
            <button type="submit" class="btn btn-submit" [disabled]="form.invalid">Enregistrer</button>
        </div>
    </form>
</div>
