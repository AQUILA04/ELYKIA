<div class="filter-card a5">
  <div class="filter-controls">

    <!-- Période rapide -->
    <div class="filter-group">
      <label class="filter-label">Période Rapide</label>
      <div class="period-pills">
        <button class="pill-btn" [class.active]="activePeriod === 'today'" (click)="selectPeriod('today')">Aujourd'hui</button>
        <button class="pill-btn" [class.active]="activePeriod === 'week'" (click)="selectPeriod('week')">Cette semaine</button>
        <button class="pill-btn" [class.active]="activePeriod === 'month'" (click)="selectPeriod('month')">Ce mois</button>
        <button class="pill-btn" [class.active]="activePeriod === 'custom'" (click)="selectPeriod('custom')">Personnalisé</button>
      </div>
    </div>

    <!-- Dates Personnalisées -->
    <div class="filter-group" *ngIf="activePeriod === 'custom'">
      <label class="filter-label">Dates Personnalisées</label>
      <div class="date-inputs">
        <input type="date" lang="fr-FR" [(ngModel)]="customDateRange.start" [max]="today" class="filter-input">
        <span class="date-sep">à</span>
        <input type="date" lang="fr-FR" [(ngModel)]="customDateRange.end" [max]="today" class="filter-input">
        <button class="btn-apply-dates" (click)="applyCustomDateRange()">Appliquer</button>
      </div>
    </div>

    <!-- Commercial -->
    <div class="filter-group" style="flex: 1; max-width: 300px;" *ngIf="!isCommercialLogue">
      <label class="filter-label">Commercial</label>
      <app-commercial-selector
        [initialValue]="currentCollector === 'all' ? null : currentCollector"
        (commercialSelected)="onCommercialSelected($event)">
      </app-commercial-selector>
    </div>
  </div>
</div>
