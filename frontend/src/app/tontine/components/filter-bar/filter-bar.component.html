<div class="filter-bar">
  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Rechercher un membre</mat-label>
    <input
      matInput
      [(ngModel)]="currentSearchTerm"
      (keydown.enter)="onSearchEnter()"
      placeholder="Nom, code client...">
    <button mat-icon-button matSuffix (click)="onSearchEnter()">
      <mat-icon>search</mat-icon>
    </button>
  </mat-form-field>

  <mat-form-field appearance="outline" class="commercial-field">
    <mat-label>Commercial</mat-label>
    <mat-select [(ngModel)]="currentSelectedCommercial" (selectionChange)="onCommercialChange($event.value)">
      <mat-option value="ALL">Tous</mat-option>
      <mat-option *ngFor="let comm of commerciaux" [value]="comm.username">{{ comm.username }}</mat-option>
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="outline" class="status-field">
    <mat-label>Statut de livraison</mat-label>
    <mat-select [(ngModel)]="currentSelectedStatus" (selectionChange)="onStatusChange($event.value)">
      <mat-option value="ALL">Tous</mat-option>
      <mat-option [value]="TontineMemberDeliveryStatus.SESSION_INPROGRESS">Session en cours</mat-option>
      <mat-option [value]="TontineMemberDeliveryStatus.PENDING">En attente</mat-option>
      <mat-option [value]="TontineMemberDeliveryStatus.VALIDATED">Validée</mat-option>
      <mat-option [value]="TontineMemberDeliveryStatus.DELIVERED">Livrée</mat-option>
    </mat-select>
  </mat-form-field>

  <button mat-flat-button color="basic" (click)="clearFilters()" class="clear-filters-button">
    <mat-icon>clear</mat-icon> Effacer les filtres
  </button>
</div>
