<ngx-spinner bdColor="rgba(51,51,51,0.8)" size="medium" color="#fff" type="ball-scale-multiple"></ngx-spinner>
<div class="container">
  <div class="header-fixed">
    <div class="d-flex justify-content-center">
      <app-breadcrumb></app-breadcrumb>
      <h1>Liste des comptes</h1>
    </div>
  </div>

  <div class="d-flex justify-content-between align-items-center mb-3">
    <input
      type="text"
      placeholder="Rechercher par nom, n° de compte..."
      [(ngModel)]="searchTerm"
      (keyup.enter)="onSearch()"
      class="form-control"
      style="width: 50%;"
    />

    <div class="button-group">
      <button class="btn refresh-button btn-sm" (click)="refresh()">
        <mat-icon>refresh</mat-icon>
        <span>Rafraîchir</span>
      </button>
      &nbsp;
      <button *ngxPermissionsOnly="['ROLE_EDIT_ACCOUNT', 'ROLE_PROMOTER']" class="btn add btn-sm" (click)="addAccount()">
        <mat-icon>add</mat-icon>
        <span>Ajouter</span>
      </button>
    </div>
  </div>

  <div class="table-container">
    <table class="article-table">
      <thead>
      <tr>
        <th>#</th>
        <th>Nom du Client</th>
        <th>Numero de compte</th>
        <th>Solde du compte</th>
        <th>Statut</th>
        <th style="text-align: right;">Action</th> </tr>
      </thead>
      <tbody>
      <tr *ngFor="let account of accounts; let i = index">
        <td>{{ (currentPage * pageSize) + (i + 1) }}</td>
        <td>{{ account.client?.firstname }} {{ account.client?.lastname }}</td>
        <td>{{ account.accountNumber }}</td>
        <td>{{ account.accountBalance | currency:'XOF':'symbol':'1.0-0' }}</td> <td>
            <span class="badge" [ngClass]="getStatusClass(account.status)">
              {{ account.status }}
            </span>
      </td>
        <td>
          <div style="display: flex; justify-content: flex-end;">
              <span *ngxPermissionsOnly="['ROLE_START_CREDIT','ROLE_VALIDATE_CREDIT']">
                <button *ngIf="account.status === 'CREATED' || account.status === 'ACTIF' || account.status === 'CLOSED'"
                        mat-icon-button
                        matTooltip="{{ account.status === 'CREATED' ? 'Activer' : (account.status === 'ACTIF' ? 'Désactiver' : 'Réactiver') }}"
                        (click)="toggleAccountStatus(account.id, account.status)">
                  <mat-icon [ngStyle]="{'color': account.status === 'CREATED' ? 'green' : (account.status === 'ACTIF' ? '#5a6a85' : '#003366')}">
                    {{ account.status === 'CREATED' ? 'power' : (account.status === 'ACTIF' ? 'block' : 'refresh') }}
                  </mat-icon>
                </button>
              </span>
            <button mat-icon-button matTooltip="Détails" (click)="viewDetails(account.id)">
              <mat-icon>visibility</mat-icon>
            </button>
            <button *ngxPermissionsOnly="['ROLE_EDIT_ACCOUNT']" mat-icon-button matTooltip="Modifier" (click)="editAccount(account.id)">
              <mat-icon style="color: #003366;">edit</mat-icon>
            </button>
            <button *ngxPermissionsOnly="['ROLE_DEL_ACCOUNT']" mat-icon-button matTooltip="Supprimer" (click)="deleteAccount(account.id)">
              <mat-icon style="color: #c90a17;">delete</mat-icon>
            </button>
          </div>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
  <mat-paginator [length]="totalElement" [pageSize]="pageSize" [pageSizeOptions]="[5, 10, 25, 100]" (page)="onPageChange($event)">
  </mat-paginator>
</div>
