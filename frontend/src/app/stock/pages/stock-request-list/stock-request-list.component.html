<ngx-spinner bdColor="rgba(51,51,51,0.8)" size="medium" color="#fff" type="ball-scale-multiple"></ngx-spinner>

<div class="container">
  <div class="header-fixed">
    <h1>Demandes de Sortie Stock</h1>
  </div>

  <div class="d-flex justify-content-end mb-3">
    <button *ngIf="isPromoter" class="btn add btn-sm" routerLink="/stock/request/create">
      <mat-icon>add</mat-icon>
      <span>Nouvelle Demande</span>
    </button>
  </div>

  <div class="table-container">
    <table class="article-table">
      <thead>
        <tr>
          <th>Référence</th>
          <th>Date Demande</th>
          <th>Commercial</th>
          <th>Statut</th>
          <th class="text-right">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let req of requests">
          <td>{{ req.reference || '-' }}</td>
          <td>{{ req.requestDate | date:'dd/MM/yyyy' }}</td>
          <td>{{ req.collector }}</td>
          <td>
            <span [ngClass]="getStatusBadge(req.status!)">{{ req.status }}</span>
          </td>

          <td class="action-buttons text-right">
            <button *ngIf="isManager && req.status === 'CREATED'" mat-icon-button (click)="validate(req)"
              matTooltip="Valider">
              <mat-icon style="color: green;">check_circle</mat-icon>
            </button>
            <button *ngIf="isStoreKeeper && req.status === 'VALIDATED'" mat-icon-button (click)="deliver(req)"
              matTooltip="Livrer">
              <mat-icon style="color: #003366;">local_shipping</mat-icon>
            </button>
          </td>
        </tr>
        <tr *ngIf="requests.length === 0">
          <td colspan="6" class="text-center">Aucune demande trouvée</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
