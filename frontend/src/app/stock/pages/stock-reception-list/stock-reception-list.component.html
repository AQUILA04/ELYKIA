<ngx-spinner bdColor="rgba(51,51,51,0.8)" size="medium" color="#fff" type="ball-scale-multiple"></ngx-spinner>

<div class="container">
  <div class="header-fixed">
    <div class="d-flex justify-content-center mb-3">
      <h1>Historique des Entrées</h1>
    </div>
  </div>

  <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <div class="search-container d-flex gap-2">
      <input type="text" class="form-control" placeholder="Rechercher par référence..." [(ngModel)]="searchReference" (input)="onSearchChange()">
      <input type="date" class="form-control" [(ngModel)]="searchDate" (input)="onSearchChange()">
    </div>

    <div class="button-group d-flex gap-2">
      <button class="btn refresh-button btn-sm" (click)="refresh()">
        <mat-icon>refresh</mat-icon>
        <span>Rafraîchir</span>
      </button>
    </div>
  </div>

  <div class="table-container">
    <table class="article-table">
      <thead>
      <tr>
        <th>#</th>
        <th>Référence</th>
        <th>Date de Réception</th>
        <th>Reçu par</th>
        <th>Montant Total</th>
        <th>Action</th>
      </tr>
      </thead>
      <tbody>
      <tr *ngFor="let reception of receptions; let i = index">
        <td>{{ (currentPage * pageSize) + (i + 1) }}</td>
        <td>{{ reception.reference }}</td>
        <td>{{ reception.receptionDate | date: 'dd/MM/yyyy' }}</td>
        <td>{{ reception.receivedBy }}</td>
        <td>{{ reception.totalAmount | currency }}</td>
        <td class="action-buttons">
          <button mat-icon-button matTooltip="Détails" (click)="viewDetails(reception.id)">
            <mat-icon>visibility</mat-icon>
          </button>
        </td>
      </tr>
      </tbody>
    </table>
  </div>

  <mat-paginator
    [length]="totalElement"
    [pageSize]="pageSize"
    [pageSizeOptions]="[5, 10, 25, 100]"
    (page)="onPageChange($event)">
  </mat-paginator>
</div>
