<ngx-spinner bdColor="rgba(51,51,51,0.8)" size="medium" color="#fff" type="ball-scale-multiple"></ngx-spinner>

<div class="container">
  <div class="form-header">
    <h1>Nouvelle Demande de Sortie Stock</h1>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Commercial <span class="text-danger">*</span></label>
      <ng-select [items]="agents" bindLabel="username" bindValue="username" [searchFn]="searchAgent"
        formControlName="collector" placeholder="Sélectionner un commercial" [clearable]="false">
        <ng-template ng-option-tmp let-item="item">
          {{item.username}} <small *ngIf="item.firstname || item.lastname">({{item.firstname}}
            {{item.lastname}})</small>
        </ng-template>
      </ng-select>
      <mat-error *ngIf="form.get('collector')?.invalid && form.get('collector')?.touched">
        Le commercial est requis.
      </mat-error>
    </div>

    <div class="form-group">
      <label>Articles <span class="text-danger">*</span></label>
      <app-article-selector formControlName="items" [articles]="articles" [priceType]="'credit'" [showPrices]="true"
        [showStock]="true" [validateStock]="false">
      </app-article-selector>
      <mat-error *ngIf="form.get('items')?.invalid && form.get('items')?.touched">
        Veuillez sélectionner au moins un article.
      </mat-error>
    </div>

    <div class="actions">
      <button type="button" class="btn btn-cancel" routerLink="/stock/request">
        Annuler
      </button>
      <button type="submit" class="btn btn-submit" [disabled]="form.invalid">
        Envoyer la Demande
      </button>
    </div>
  </form>
</div>
