<ngx-spinner bdColor="rgba(51,51,51,0.8)" size="medium" color="#fff" type="ball-scale-multiple"></ngx-spinner>

<div class="container">
  <div class="form-header">
    <h1>Nouveau Retour Stock</h1>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <!-- Commercial Selector (Storekeepers only) -->
    <div *ngIf="isStoreKeeper" class="commercial-selector-section">
      <div class="form-group">
        <label>Commercial <span class="required">*</span></label>
        <ng-select [items]="commercials" bindLabel="username" bindValue="username" [(ngModel)]="selectedCommercial"
          [ngModelOptions]="{standalone: true}" (change)="onCommercialSelected()" [searchFn]="searchCommercial"
          placeholder="Sélectionner un commercial" [clearable]="false">
          <ng-template ng-option-tmp let-item="item">
            <div class="commercial-option">
              <strong>{{ item.username }}</strong>
              <span class="commercial-name">{{ item.firstname }} {{ item.lastname }}</span>
            </div>
          </ng-template>
        </ng-select>
      </div>
    </div>

    <div class="form-group" *ngIf="selectedCommercial || !isStoreKeeper">
      <label>Articles à retourner<span class="text-danger">*</span></label>
      <app-article-selector
        formControlName="items"
        [articles]="availableStockItems"
        [priceType]="'inventory'"
        [showStock]="true"
        [validateStock]="true"
      >
      </app-article-selector>
      <mat-error *ngIf="form.get('items')?.invalid && form.get('items')?.touched">
        Au moins un article doit être sélectionné.
      </mat-error>
    </div>

    <div class="actions">
      <button type="button" class="btn btn-cancel" routerLink="/stock/return">Annuler</button>
      <button type="submit" class="btn btn-submit" [disabled]="form.invalid || (isStoreKeeper && !selectedCommercial)">
        <mat-icon>undo</mat-icon> Valider le Retour
      </button>
    </div>
  </form>
</div>
