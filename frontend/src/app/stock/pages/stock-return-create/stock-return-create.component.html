<ngx-spinner bdColor="rgba(51,51,51,0.8)" size="medium" color="#fff" type="ball-scale-multiple"></ngx-spinner>

<div class="container">
  <div class="form-header">
    <h1>Nouveau Retour Stock</h1>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <!-- Commercial Selector (Storekeepers only) -->
    <div *ngIf="isStoreKeeper" class="commercial-selector-section">
      <div class="form-group">
        <label>Commercial <span class="required">*</span></label>
        <ng-select [items]="commercials" bindLabel="username" bindValue="username" [(ngModel)]="selectedCommercial"
          [ngModelOptions]="{standalone: true}" (change)="onCommercialSelected()" [searchFn]="searchCommercial"
          placeholder="Sélectionner un commercial" [clearable]="false">
          <ng-template ng-option-tmp let-item="item">
            <div class="commercial-option">
              <strong>{{ item.username }}</strong>
              <span class="commercial-name">{{ item.firstname }} {{ item.lastname }}</span>
            </div>
          </ng-template>
        </ng-select>
      </div>
    </div>

    <div formArrayName="items" class="return-items-list">
      <div *ngFor="let item of items.controls; let i = index" [formGroupName]="i" class="return-item-row">
        <div class="row align-items-end">
          <div class="col-md-7">
            <div class="form-group mb-0">
              <label [for]="'stockItem'+i">Article (Stock disponible)</label>
              <select [id]="'stockItem'+i" formControlName="stockItem" class="custom-select">
                <option [ngValue]="null" disabled>Sélectionner un article</option>
                <option *ngFor="let sItem of availableStockItems" [ngValue]="sItem">
                  {{ sItem.article.name }} — Reste: {{ sItem.quantityRemaining }}
                </option>
              </select>
            </div>
          </div>
          <div class="col-md-3">
            <div class="form-group mb-0">
              <label [for]="'quantity'+i">Quantité</label>
              <input [id]="'quantity'+i" type="number" formControlName="quantity" class="custom-input">
            </div>
          </div>
          <div class="col-md-2">
            <button type="button" class="btn-icon delete" (click)="removeItem(i)" matTooltip="Supprimer cet article">
              <mat-icon>delete_outline</mat-icon>
            </button>
          </div>
        </div>
        <div *ngIf="item.get('quantity')?.hasError('max')" class="error-hint">
          <mat-icon>error_outline</mat-icon> La quantité dépasse le stock disponible.
        </div>
      </div>
    </div>

    <div class="add-action-container">
      <button type="button" class="btn-add-item" (click)="addItem()">
        <mat-icon>add_circle_outline</mat-icon> Ajouter un autre article
      </button>
    </div>

    <div class="actions">
      <button type="button" class="btn btn-cancel" routerLink="/stock/return">Annuler</button>
      <button type="submit" class="btn btn-submit" [disabled]="form.invalid || (isStoreKeeper && !selectedCommercial)">
        <mat-icon>undo</mat-icon> Valider le Retour
      </button>
    </div>
  </form>
</div>
