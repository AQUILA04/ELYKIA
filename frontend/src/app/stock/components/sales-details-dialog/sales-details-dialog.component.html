<h2 mat-dialog-title>Détails des ventes - {{ data.articleName }}</h2>
<mat-dialog-content>
  <div class="summary-info">
    <p><strong>Total Vendu:</strong> {{ data.totalSold }}</p>
  </div>

  <div *ngIf="loading" class="loading-spinner">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <div *ngIf="!loading && salesDetails.length > 0" class="table-container">
    <table mat-table [dataSource]="salesDetails" class="mat-elevation-z8">
      <!-- Reference Column -->
      <ng-container matColumnDef="reference">
        <th mat-header-cell *matHeaderCellDef> Référence Crédit </th>
        <td mat-cell *matCellDef="let element"> {{element.reference}} </td>
      </ng-container>

      <!-- Client Name Column -->
      <ng-container matColumnDef="clientName">
        <th mat-header-cell *matHeaderCellDef> Nom et Prénom du Client </th>
        <td mat-cell *matCellDef="let element"> {{element.clientName}} </td>
      </ng-container>

      <!-- Quantity Column -->
      <ng-container matColumnDef="quantity">
        <th mat-header-cell *matHeaderCellDef> Quantité </th>
        <td mat-cell *matCellDef="let element"> {{element.quantity}} </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="['reference', 'clientName', 'quantity']"></tr>
      <tr mat-row *matRowDef="let row; columns: ['reference', 'clientName', 'quantity'];"></tr>
    </table>
  </div>

  <div *ngIf="!loading && salesDetails.length === 0" class="no-data">
    <p>Aucune vente trouvée pour cet article.</p>
  </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="close()">Fermer</button>
</mat-dialog-actions>
