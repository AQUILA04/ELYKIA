<div class="p-4 flex justify-center">
    <mat-card class="w-full max-w-lg">
        <mat-card-header>
            <mat-card-title>{{ isEditMode ? 'Modifier' : 'Ajouter' }} Type de Dépense</mat-card-title>
        </mat-card-header>
        <mat-card-content class="pt-4">
            <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">

                <mat-form-field appearance="outline">
                    <mat-label>Nom</mat-label>
                    <input matInput formControlName="name" placeholder="Ex: Transport">
                    <mat-error *ngIf="form.get('name')?.hasError('required')">Le nom est obligatoire</mat-error>
                </mat-form-field>

                <div class="flex justify-end gap-2 mt-4">
                    <button mat-button type="button" (click)="onCancel()" [disabled]="loading">Annuler</button>
                    <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid || loading">
                        {{ isEditMode ? 'Modifier' : 'Ajouter' }}
                    </button>
                </div>
            </form>
        </mat-card-content>
    </mat-card>
</div>
