<ngx-spinner bdColor="rgba(51,51,51,0.8)" size="medium" color="#fff" type="ball-scale-multiple"></ngx-spinner>
<div class="container">
  <div class="header-fixed">
    <div class="d-flex justify-content-center">
      <h1>Liste des localités</h1>
    </div>
  </div>

  <div class="d-flex justify-content-between align-items-center mb-3">

    <input
      type="text"
      placeholder="Rechercher..."
      [(ngModel)]="searchTerm"
      (input)="onSearch()"
      class="form-control w-50"
    />

    <div class="button-group">
      <button class="btn refresh-button btn-sm" (click)="refresh()">
        <mat-icon>refresh</mat-icon>
        <span>Rafraîchir</span>
      </button>
      &nbsp;
      <button *ngxPermissionsOnly="['ROLE_EDIT_LOCALITY']" class="btn add btn-sm" (click)="addLocality()">
        <mat-icon>add</mat-icon>
        <span>Ajouter</span>
      </button>
    </div>
  </div>

  <div class="table-container">
    <table class="article-table">
      <thead>
      <tr>
        <th>#</th>
        <th>Nom</th>
        <th>Action</th>
      </tr>
      </thead>
      <tbody>
      <tr *ngFor="let locality of localities; let i = index">
        <td>{{ (currentPage * pageSize) + (i + 1) }}</td>
        <td>{{ locality.name }}</td>
        <td>
          <button mat-icon-button matTooltip="Détails" (click)="viewDetails(locality.id)">
            <mat-icon>visibility</mat-icon>
          </button>
          <button *ngxPermissionsOnly="['ROLE_EDIT_LOCALITY']" mat-icon-button matTooltip="Modifier" (click)="editLocality(locality.id)">
            <mat-icon style="color: #003366;">edit</mat-icon>
          </button>
          <button *ngxPermissionsOnly="['ROLE_DEL_LOCALITY']"  mat-icon-button matTooltip="Supprimer" (click)="deleteLocality(locality.id)">
            <mat-icon style="color: #c90a17;">delete</mat-icon>
          </button>
        </td>
      </tr>
      <tr *ngIf="localities.length === 0">
        <td colspan="3" class="no-data-cell">Aucune localité trouvée.</td>
      </tr>
      </tbody>
    </table>
  </div>
  <mat-paginator [length]="totalElement" [pageSize]="pageSize" [pageSizeOptions]="[5, 10, 25, 100]" (page)="onPageChange($event)">
  </mat-paginator>
</div>
