<div class="container client-details-page">
  <div class="loading-container" *ngIf="isLoading">
    <mat-spinner diameter="50"></mat-spinner>
  </div>

  <div *ngIf="!isLoading && client">
    <!-- 1. Header & Actions -->
    <div class="page-header d-flex justify-content-between align-items-center mb-4">
      <h1>{{ client.firstname }} {{ client.lastname }}</h1>
      <div class="actions d-flex gap-3">
        <button mat-stroked-button (click)="onCancel()">
          <mat-icon>arrow_back</mat-icon> Retour
        </button>
        <button mat-raised-button class="btn-brand" (click)="navigateToEdit(client.id)">
          <mat-icon>edit</mat-icon> Modifier
        </button>
      </div>
    </div>

    <!-- 2. Résumé des Opérations (KPIs) -->
    <app-client-kpi-cards [clientDetails]="clientDetails"></app-client-kpi-cards>

    <div class="row">
      <!-- 3. Informations Personnelles (Sidebar ou Colonne Gauche) -->
      <div class="col-md-4 mb-4">
        <app-client-info-card [client]="client" [safeProfilPhotoUrl]="safeProfilPhotoUrl"></app-client-info-card>
      </div>

      <!-- 4. Contenu Principal (Onglets Droite) -->
      <div class="col-md-8">
        <mat-card class="tabs-card">
          <mat-tab-group animationDuration="0ms" mat-stretch-tabs="false" mat-align-tabs="start">

            <!-- Onglet Achats (Expandable) -->
            <mat-tab label="Historique des Achats">
              <app-client-credit-list
                [credits]="credits"
                [totalCreditElements]="totalCreditElements"
                [creditPageSize]="creditPageSize"
                (pageChange)="onCreditPageChange($event)">
              </app-client-credit-list>
            </mat-tab>

            <!-- Onglet Dernières Cotisations -->
            <mat-tab label="Historique des Cotisations">
              <app-client-cotisation-history
                [cotisations]="cotisations"
                [totalCotisationElements]="totalCotisationElements"
                [cotisationPageSize]="cotisationPageSize"
                (pageChange)="onCotisationPageChange($event)">
              </app-client-cotisation-history>
            </mat-tab>

          </mat-tab-group>
        </mat-card>
      </div>
    </div>
  </div>
</div>
