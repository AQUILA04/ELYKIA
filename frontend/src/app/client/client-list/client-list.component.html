<ngx-spinner bdColor="rgba(51,51,51,0.8)" size="medium" color="#fff" type="ball-scale-multiple"></ngx-spinner>
<div class="container">
  <div class="header-fixed">
    <div class="d-flex justify-content-center">
      <h1>Liste des clients</h1>
    </div>
  </div>

  <div class="d-flex justify-content-between align-items-center mb-3 responsive-controls">

    <input type="text" placeholder="Rechercher un client..." [(ngModel)]="searchTerm" (keyup.enter)="onSearch()"
      class="form-control w-50" />

    <app-commercial-selector [initialValue]="selectedCommercial"
      (commercialSelected)="onCommercialSelected($event)"></app-commercial-selector>

    <div class="button-group">
      <button class="btn refresh-button btn-sm" (click)="refresh()">
        <mat-icon>refresh</mat-icon>
        <span>Rafraîchir</span>
      </button>
      <button *ngxPermissionsOnly="['ROLE_EDIT_CLIENT', 'ROLE_PROMOTER']" class="btn add btn-sm" (click)="addClient()">
        <mat-icon>add</mat-icon>
        <span>Ajouter</span>
      </button>
    </div>
  </div>

  <div class="table-container">
    <table class="article-table mobile-responsive">
      <thead>
        <tr>
          <th>#</th>
          <th>Nom</th>
          <th>Prénom</th>
          <th>Localité</th>
          <th>Numéro de téléphone</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let client of this.clients; let i = index">
          <td data-label="#">{{(currentPage * pageSize) + (i + 1)}}</td>
          <td data-label="Nom"><a [routerLink]="['/client-view', client.id]"
              style="cursor: pointer; color: #3f51b5; text-decoration: none;">{{client.lastname}}</a></td>
          <td data-label="Prénom">{{client.firstname}}</td>
          <td data-label="Localité">{{client.address}}</td>
          <td data-label="Numéro de téléphone">{{client.phone}}</td>
          <td data-label="Action">
            <button mat-icon-button matTooltip="Détails" (click)="viewDetails(client.id)">
              <mat-icon>visibility</mat-icon>
            </button>
            <button *ngxPermissionsOnly="['ROLE_EDIT_CLIENT']" mat-icon-button matTooltip="Modifier"
              (click)="editClient(client.id)">
              <mat-icon style="color: #003366;">edit</mat-icon>
            </button>
            <button *ngxPermissionsOnly="['ROLE_DEL_CLIENT']" mat-icon-button matTooltip="Supprimer"
              (click)="deleteClient(client.id)">
              <mat-icon style="color: #c90a17;">delete</mat-icon>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <mat-paginator [length]="totalElement" [pageSize]="pageSize" [pageSizeOptions]="[5, 10, 25, 100]"
    (page)="onPageChange($event)">
  </mat-paginator>
</div>
