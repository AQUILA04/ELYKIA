<div *ngIf="movements.length > 0; else noMovements">
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Type</th>
                    <th>Qté</th>
                    <th>Stock</th>
                    <th>Date</th>
                    <th>Par</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let m of displayedMovements">
                    <td>
                        <span [class]="'op-badge ' + badgeClass(m.operationType)">
                            {{ m.operationType }}
                        </span>
                    </td>
                    <td>
                        <span [class]="qtyClass(m.operationType)">
                            {{ qtyPrefix(m.operationType) }}{{ m.operationQuantity }}
                        </span>
                    </td>
                    <td class="stock-flow">
                        {{ m.initialQuantity }}&nbsp;<span class="arrow">→</span>&nbsp;{{ m.finalQuantity }}
                    </td>
                    <td>{{ formatDate(m.operationDate) }}</td>
                    <td class="col-user">{{ m.operationUser }}</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="view-all" *ngIf="movements.length > limit">
        <span class="count-badge">+{{ movements.length - limit }} mouvements supplémentaires</span>
    </div>
</div>

<ng-template #noMovements>
    <div class="empty-state">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z" />
            <line x1="12" y1="12" x2="12" y2="12" />
        </svg>
        <p>Aucun mouvement enregistré</p>
    </div>
</ng-template>
