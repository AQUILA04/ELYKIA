<ngx-spinner bdColor="rgba(51,51,51,0.8)" size="medium" color="#fff" type="ball-scale-multiple"></ngx-spinner>
<div class="container">
  <div class="header-fixed">
    <div class="d-flex justify-content-center">
      <app-breadcrumb></app-breadcrumb>
      <h1>Liste des Commerciaux</h1>
    </div>
  </div>
  <div class="button-group">
    <button class="btn refresh-button btn-sm" (click)="refresh()">
      <mat-icon>refresh</mat-icon>
      <span>Rafraîchir</span>
    </button>
  </div>

  <div class="table-container">
    <table class="article-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Nom d'utilisateur</th>
          <th>Noms</th>
          <th>Téléphone</th>
          <!-- <th>Action</th> -->
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let commercial of commercials; let i = index">
          <td>{{ (currentPage * pageSize) + (i + 1) }}</td>
          <td>
            <a [routerLink]="['/commercial-view', commercial.id, commercial.username]" class="username-link">{{ commercial.username }}</a>
          </td>
          <td>{{ commercial.firstname }} {{ commercial.lastname }}</td>
          <td>{{ commercial.phone }}</td>
          <!-- <td>
            <button mat-icon-button matTooltip="Détails" (click)="viewDetails(commercial.id)">
              <mat-icon>visibility</mat-icon>
            </button>
            <button mat-icon-button matTooltip="Modifier" (click)="editCommercial(commercial.id)">
              <mat-icon style="color: #003366;">edit</mat-icon>
            </button>
            <button mat-icon-button matTooltip="Supprimer" (click)="deleteCommercial(commercial.id)">
              <mat-icon style="color: #c90a17;">delete</mat-icon>
            </button>
          </td> -->
        </tr>
      </tbody>
    </table>
  </div>
  <mat-paginator [length]="totalElement" [pageSize]="pageSize" [pageSizeOptions]="[5, 10, 25, 100]" (page)="onPageChange($event)">
  </mat-paginator>
</div>
