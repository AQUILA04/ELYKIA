<div class="container p-4">
    <mat-card>
        <mat-card-header>
            <mat-card-title>Nouvelle Permission</mat-card-title>
        </mat-card-header>
        <mat-card-content class="pt-3">
            <form [formGroup]="permissionForm" (ngSubmit)="onSubmit()">
                <div class="row">
                    <div class="col-md-12">
                        <mat-form-field appearance="outline" class="w-100">
                            <mat-label>Nom de la permission</mat-label>
                            <input matInput formControlName="name" placeholder="Ex: USER_READ">
                            <mat-error *ngIf="permissionForm.get('name')?.hasError('required')">
                                Le nom est obligatoire
                            </mat-error>
                        </mat-form-field>
                    </div>
                </div>

                <div class="d-flex justify-content-end mt-3">
                    <button mat-button type="button" routerLink="/security/permissions" class="me-2">Annuler</button>
                    <button mat-raised-button color="primary" type="submit" [disabled]="permissionForm.invalid">
                        Créer
                    </button>
                </div>
            </form>
        </mat-card-content>
    </mat-card>
</div>
