<div class="details-container" *ngIf="!isLoading">
  <div class="form-header">
    <h1>Details de l'utilisateur</h1>
  </div>
  <div class="details-content" *ngIf="user">
    <div class="details-row">
      <span class="details-label">Nom d'utilisateur</span>
      <div class="details-value">{{ user.username }}</div>
    </div>
    <div class="details-row">
      <span class="details-label">Nom et prénom</span>
      <div class="details-value">{{ user.firstname }} {{ user.lastname }}</div>
    </div>
    <div class="details-row">
      <span class="details-label">Numero de telephone</span>
      <div class="details-value">{{ user.phone }}</div>
    </div>
    <div class="details-row">
      <span class="details-label">Genre</span>
      <div class="details-value">{{ user.gender }}</div>
    </div>
    <div class="details-row">
      <span class="details-label">Profil</span>
      <div class="details-value">{{ user.profil?.name }}</div>
    </div>

    <div class="mt-4">
      <div class="row justification-content-center">
        <div class="col-12 text-center">
          <h4 class="mb-3">Permissions Spécifiques</h4>
          <!-- Wrapper for centering if necessary, though col-12 text-center helps title. Picklist might need its own centering if it has fixed width -->
          <div class="d-flex justify-content-center">
            <div style="width: 100%;">
              <app-permission-picklist [allPermissions]="allPermissions" [assignedPermissions]="assignedPermissions"
                (assignedPermissionsChange)="onPermissionsChange($event)">
              </app-permission-picklist>
            </div>
          </div>

          <div class="d-flex justify-content-end mt-3">
            <button mat-raised-button color="primary" (click)="savePermissions()">
              <mat-icon>save</mat-icon>
              <span class="ms-2">Enregistrer les permissions</span>
            </button>
          </div>
        </div>
      </div>
    </div>
    <div class="form-actions">
      <a (click)="onCancel()" class="link-back">
        <i class="ti ti-arrow-left"></i> Retour à la liste
      </a>

      <div class="form-actions">
        <a (click)="navigateToEdit()" class="link-edit">
          <i class="ti ti-pencil"></i> Modifier
        </a>
      </div>
    </div>
  </div>
  <div *ngIf="isLoading">Chargement...</div>
