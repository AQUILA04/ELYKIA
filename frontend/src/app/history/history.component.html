<ngx-spinner bdColor="rgba(51,51,51,0.8)" size="medium" color="#fff" type="ball-scale-multiple"></ngx-spinner>

<div class="container">
  <app-breadcrumb></app-breadcrumb>

  <!-- Entête -->
  <div class="header-fixed">
    <div class="d-flex justify-content-center">
      <h1>Historique des ventes</h1>
    </div>
  </div>

  <!-- Refresh Button -->
  <div class="d-flex justify-content-end">
    <button class="btn refresh-button btn-sm" (click)="loadHistory()">
      <mat-icon>refresh</mat-icon>
      <span>Rafraîchir</span>
    </button>
  </div>

  <!-- Credits Table -->
  <div class="table-container">
    <table class="article-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Commercial</th>
          <th>Date de début</th>
          <th>Montant</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let credit of credits; let i = index">
          <td>{{ (currentPage * pageSize) + (i + 1) }}</td>
          <td>{{ credit.client.firstname }} </td>
          <td>{{ credit.beginDate | date: 'dd/MM/yyyy' }}</td>
          <td>{{ credit.totalAmount | currency }}</td>
          <td>{{ credit.status }}</td>
<td class="action-buttons">
  <button mat-icon-button matTooltip="Détails" (click)="viewDetails(credit.id)">
    <mat-icon>visibility</mat-icon>
  </button>
  <span *ngIf="credit.updatable">
    <button *ngxPermissionsOnly="['ROLE_STOREKEEPER']" mat-icon-button matTooltip="Retour en stock" (click)="backToStore(credit.id)">
      <mat-icon>compare-arrows</mat-icon>
    </button>
  </span>
  <!-- <button *ngxPermissionsOnly="['ROLE_DEL_CREDIT']" mat-icon-button matTooltip="Supprimer" (click)="deleteCredit(credit.id)">
    <mat-icon style="color: #c90a17;">delete</mat-icon>
  </button> -->
</td>
</tr>
</tbody>
</table>
</div>

  <!-- Pagination -->
  <mat-paginator
    [length]="totalItems"
    [pageSize]="pageSize"
    [pageSizeOptions]="[5, 10, 25, 100]"
    (page)="onPageChange($event)">
  </mat-paginator>
</div>
