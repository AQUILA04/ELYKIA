<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau avec retours</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }
        table {
            width: 80%;
            margin: 20px auto;
            border-collapse: collapse;
            background-color: white;
        }
        table, th, td {
            border: 1px solid #ddd;
        }
        th, td {
            padding: 12px;
            text-align: center;
        }
        th {
            background-color: #333;
            color: white;
        }
        input[type="number"] {
            width: 80%;
            padding: 5px;
        }
        input[readonly] {
            background-color: #f9f9f9;
            border: none;
            text-align: center;
        }
    </style>
</head>
<body>
<main>
    <table>
        <thead>
        <tr>
            <th>Case à cocher</th>
            <th>Nom de l'article</th>
            <th>Quantité actuelle</th>
            <th>Quantité à retourner</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td><input type="checkbox"></td>
            <td><input type="text" value="Article 1" readonly></td>
            <td><input type="text" value="10" readonly></td>
            <td><input type="number" min="0"></td>
        </tr>
        <tr>
            <td><input type="checkbox"></td>
            <td><input type="text" value="Article 2" readonly></td>
            <td><input type="text" value="5" readonly></td>
            <td><input type="number" min="0"></td>
        </tr>
        <tr>
            <td><input type="checkbox"></td>
            <td><input type="text" value="Article 3" readonly></td>
            <td><input type="text" value="20" readonly></td>
            <td><input type="number" min="0"></td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
