<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Rapport des Crédits en Retard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            color: #333;
        }

        .company-name {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        h1 {
            text-align: center;
            color: #003366;
            margin-bottom: 20px;
            margin-top: 5px;
        }

        .header-info {
            margin-bottom: 20px;
            border-bottom: 2px solid #003366;
            padding-bottom: 10px;
        }

        .header-info p {
            margin: 5px 0;
            font-size: 14px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 12px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #003366;
            color: white;
            text-transform: uppercase;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        .summary {
            margin-top: 30px;
            text-align: right;
            font-size: 16px;
            font-weight: bold;
            color: #003366;
        }
        
        .badge-delai {
            color: #b91c1c;
            font-weight: bold;
        }

        .badge-echeance {
            color: #c75000;
            font-weight: bold;
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 11px;
            color: #888;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
    </style>
</head>
<body>

    <div class="company-name">AMENOUVEVE - YAVEH</div>
    <h1>Rapport des Crédits en Retard</h1>

    <div class="header-info">
        <p><strong>Commercial : </strong> <span th:text="${collectorName}"></span></p>
        <p><strong>Mois d'échéance : </strong> <span th:text="${month}"></span></p>
        <p><strong>Type de retard : </strong> <span th:text="${lateType}"></span></p>
        <p><strong>Date de génération : </strong> <span th:text="${generationDate}"></span></p>
    </div>

    <table>
        <thead>
            <tr>
                <th>Réf</th>
                <th>Client</th>
                <th>Type de Retard</th>
                <th>Jours de Retard</th>
                <th>Commercial</th>
                <th>Reste à Payer</th>
            </tr>
        </thead>
        <tbody>
            <tr th:if="${#lists.isEmpty(credits)}">
                <td colspan="6" style="text-align: center; font-style: italic;">Aucun crédit en retard trouvé.</td>
            </tr>
            <tr th:each="credit : ${credits}">
                <td th:text="${credit.reference}"></td>
                <td>
                    <span th:text="${credit.clientName}"></span><br/>
                    <small th:text="${credit.clientPhone}" style="color: #666;"></small>
                </td>
                <td th:class="${credit.lateType.name() == 'DELAI' ? 'badge-delai' : 'badge-echeance'}"
                    th:text="${credit.lateType.name() == 'DELAI' ? 'Délai' : 'Échéance'}"></td>
                <td th:text="${credit.lateType.name() == 'DELAI' ? credit.lateDaysDelai + ' jours' : credit.lateDaysEcheance + ' jours'}"></td>
                <td th:text="${credit.collector}"></td>
                <td th:text="${credit.totalAmountRemaining}"></td>
            </tr>
        </tbody>
    </table>

    <div class="summary">
        <p>Total Reste à Payer : <span th:text="${totalAmountRemaining}"></span></p>
    </div>

    <div class="footer">
        © 2026 Elykia. Tous droits réservés.
    </div>

</body>
</html>
