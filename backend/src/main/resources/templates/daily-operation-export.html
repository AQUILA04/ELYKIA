<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <style>
        body {
            font-family: sans-serif;
            font-size: 12px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        .header {
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .header p {
            margin: 5px 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
            font-weight: bold;
        }

        .text-right {
            text-align: right;
        }

        .text-center {
            text-align: center;
        }

        .status-deposit {
            color: green;
        }

        .status-withdrawal {
            color: red;
        }

        .footer {
            margin-top: 30px;
            text-align: right;
            font-size: 1.1em;
            font-weight: bold;
            border-top: 2px solid #eee;
            padding-top: 10px;
        }

        .no-data {
            text-align: center;
            padding: 20px;
            font-style: italic;
            color: #777;
        }
    </style>
</head>

<body>

    <h1 th:text="${context.title}">Journal des Opérations</h1>

    <div class="header">
        <p><strong>Période :</strong> <span th:text="${context.startDate}"></span> au <span
                th:text="${context.endDate}"></span></p>
        <p><strong>Commercial :</strong> <span th:text="${context.collector}"></span></p>
        <p><strong>Date de génération :</strong> <span th:text="${context.generationDate}"></span></p>
    </div>

    <table>
        <thead>
            <tr>
                <th>Heure</th>
                <th>Commercial</th>
                <th>Type</th>
                <th>Référence / Sujet</th>
                <th>Description</th>
                <th class="text-right">Montant</th>
            </tr>
        </thead>
        <tbody>
            <tr th:if="${#lists.isEmpty(context.operations)}">
                <td colspan="6" class="no-data">Aucune opération trouvée pour cette période.</td>
            </tr>
            <tr th:each="op : ${context.operations}">
                <td th:text="${#temporals.format(op.timestamp, 'dd/MM/yyyy HH:mm')}"></td>
                <td th:text="${op.commercialUsername}"></td>
                <td th:text="${op.type}"></td>
                <td th:text="${op.reference}"></td>
                <td th:text="${op.description}"></td>
                <td class="text-right"
                    th:text="${#numbers.formatDecimal(op.amount, 1, 'WHITESPACE', 0, 'COMMA') + ' F'}"></td>
            </tr>
        </tbody>
    </table>

    <div class="footer" th:if="${!#lists.isEmpty(context.operations)}">
        <p>Total Montant : <span
                th:text="${#numbers.formatDecimal(context.totalAmount, 1, 'WHITESPACE', 0, 'COMMA') + ' F'}"></span></p>
    </div>

</body>

</html>
