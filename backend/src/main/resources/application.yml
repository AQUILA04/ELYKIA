    active: prod
  application:
    name: optimize-elykia-core

  # Configuration Flyway pour la gestion des migrations de base de données
  flyway:
    enabled: false
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    validate-on-migrate: true
    out-of-order: false
    placeholder-replacement: true
    placeholders:
      project: optimize-elykia-core
