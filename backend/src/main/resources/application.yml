      "COM001":
        firstname: "COM001"
        lastname: "COM001"
        phone: ""
        address: "Lomé"
        cardID: ""
        cardType: "CNI"
        dateOfBirth: "1990-01-01"
        collector: "COM001"
        quarter: "Tokoin"
        occupation: "Commercial"
        type: PROMOTER
        account:
          accountNumber: "0011010001"
          accountBalance: 100000.00

app:
  folder: ${user.home}/.optimize-elykia-core/operations/
  security:
    parameter:
      init-enabled: true
      init-data[0]:
        key: ENABLED_ACCOUNT_BALANCE_CONTROL
        value: true
        description: Activer la vérification du solde du compte du client pour limiter le montant de crédit qu'il peut prendre
      init-data[1]:
        key: AGENCY_COLLECTOR
        value: COM001
        description: Le Username du commercial qui comptabilise les opération de vente en agence
      init-data[2]:
        key: USE_MEMBER_REGISTRATION_DATE_FOR_SHARE
        value: true
        description: Utiliser la date d'adhésion d'un membre tontine pour calculer la part société à prélever (si désactiver, on utilise la date debut de la session de tontine)

loki:
  url: ${LOKI_URL:https://logs-prod-028.grafana.net/loki/api/v1/push}
  user-id: ${LOKI_USER_ID:1114217}
  api-key: ${LOKI_API_KEY:}

springdoc:
  swagger-ui:
    # Allow Swagger UI to load the local api-docs regardless of the host (IP, domain, etc.)
    # Without this, Swagger UI tries to load petstore by default when accessed from an external IP
    disable-swagger-default-url: true
    url: /v3/api-docs
  api-docs:
    enabled: true

logging:
  file:
    path: ${user.home}/.${spring.application.name}/logs
