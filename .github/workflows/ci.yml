name: ELYKIA CI Pipeline

on:
  push:
    branches: [ main, develop, 'release/**' ]
  pull_request:
    branches: [ main, develop, 'release/**' ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      backend_lib: ${{ steps.filter.outputs.backend_lib }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
    - uses: actions/checkout@v4
    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          frontend:
            - 'frontend/**'
          backend:
            - 'backend/**'
          backend_lib:
            - 'backend-lib/**'
          mobile:
            - 'mobile/**'

  build-frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: ./frontend
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to the Container registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

  build-backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        server-id: github
        settings-path: ${{ github.workspace }}

    # Build dependencies in order before building backend
    - name: Build common-entities
      run: mvn -B clean install -DskipTests --file backend-lib/common-entities/pom.xml

    - name: Build common-securities
      run: mvn -B clean install -DskipTests --file backend-lib/common-securities/pom.xml

    - name: Build elykia-client
      run: mvn -B clean install -DskipTests --file backend-lib/elykia-client/pom.xml

    - name: Package Backend
      run: mvn -B package -DskipTests --file backend/pom.xml

    - name: Deploy Backend Maven Artifact
      run: mvn -B deploy -DskipTests --file backend/pom.xml -s $GITHUB_WORKSPACE/settings.xml || echo "Deployment failed, likely because version already exists. Continuing..."
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Docker Build & Push for Backend
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to the Container registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

  build-backend-lib:
    needs: changes
    if: ${{ needs.changes.outputs.backend_lib == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        server-id: github
        settings-path: ${{ github.workspace }}

    - name: Build and Deploy common-entities
      run: mvn -B deploy -DskipTests --file backend-lib/common-entities/pom.xml -s $GITHUB_WORKSPACE/settings.xml || echo "Deployment failed, likely because version already exists. Continuing..."
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Deploy common-securities
      run: mvn -B deploy -DskipTests --file backend-lib/common-securities/pom.xml -s $GITHUB_WORKSPACE/settings.xml || echo "Deployment failed, likely because version already exists. Continuing..."
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Deploy elykia-client
      run: mvn -B deploy -DskipTests --file backend-lib/elykia-client/pom.xml -s $GITHUB_WORKSPACE/settings.xml || echo "Deployment failed, likely because version already exists. Continuing..."
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mobile:
    needs: changes
    if: ${{ needs.changes.outputs.mobile == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mobile
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'mobile/package-lock.json'
        
    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Clean npm cache
      run: npm cache clean --force
      
    - name: Install dependencies
      run: npm install --legacy-peer-deps
      
    - name: Install Ionic CLI
      run: npm install -g @ionic/cli
      
    - name: Install Capacitor CLI
      run: npm install -g @capacitor/cli
      
    - name: Build Ionic app
      run: |
        ionic build --prod
      
    - name: Add Android platform
      run: |
        npx cap add android
        
    - name: Sync Capacitor
      run: |
        npx cap sync android

    - name: Grant execute permission for gradlew
      run: |
        chmod +x android/gradlew
      
    - name: Build Android Debug APK
      run: |
        cd android
        ./gradlew assembleDebug
      
    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: elykia-mobile-debug-apk
        path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: ${{ github.ref == 'refs/heads/main' && 90 || 10 }}
