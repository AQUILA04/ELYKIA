name: ELYKIA CI Pipeline

on:
  push:
    branches: [ main, develop, 'release/**' ]
  pull_request:
    branches: [ main, develop, 'release/**' ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      backend_lib: ${{ steps.filter.outputs.backend_lib }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
    - uses: actions/checkout@v4
    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          frontend:
            - 'frontend/**'
          backend:
            - 'backend/**'
          backend_lib:
            - 'backend-lib/**'
          mobile:
            - 'mobile/**'

  build-frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: ./frontend
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set lowercase image name
      run: |
        # Ensure repository name is lowercase for Docker tags (GHCR requires lowercase repository names)
        echo "IMAGE_NAME_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

    - name: Set lowercase image name
      run: |
        # Ensure repository name is lowercase for Docker tags (GHCR requires lowercase repository names)
        echo "IMAGE_NAME_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to the Container registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-frontend

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-frontend:${{ github.sha }}
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-frontend:latest
        labels: ${{ steps.meta.outputs.labels }}

  build-backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        server-id: github
        settings-path: ${{ github.workspace }}

    # Build dependencies in order before building backend
    - name: Build common-entities
      run: mvn -B clean install -DskipTests --file backend-lib/common-entities/pom.xml

    - name: Build common-securities
      run: mvn -B clean install -DskipTests --file backend-lib/common-securities/pom.xml

    - name: Build elykia-client
      run: mvn -B clean install -DskipTests --file backend-lib/elykia-client/pom.xml

    - name: Package Backend
      run: mvn -B package -DskipTests --file backend/pom.xml

    - name: Deploy Backend Maven Artifact
      run: mvn -B deploy -DskipTests --file backend/pom.xml -s $GITHUB_WORKSPACE/settings.xml || echo "Deployment failed, likely because version already exists. Continuing..."
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Docker Build & Push for Backend
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to the Container registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-backend

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-backend:${{ github.sha }}
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-backend:latest
        labels: ${{ steps.meta.outputs.labels }}

  build-backend-lib:
    needs: changes
    if: ${{ needs.changes.outputs.backend_lib == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        server-id: github
        settings-path: ${{ github.workspace }}

    - name: Build and Deploy common-entities
      run: mvn -B deploy -DskipTests --file backend-lib/common-entities/pom.xml -s $GITHUB_WORKSPACE/settings.xml || echo "Deployment failed, likely because version already exists. Continuing..."
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Deploy common-securities
      run: mvn -B deploy -DskipTests --file backend-lib/common-securities/pom.xml -s $GITHUB_WORKSPACE/settings.xml || echo "Deployment failed, likely because version already exists. Continuing..."
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Deploy elykia-client
      run: mvn -B deploy -DskipTests --file backend-lib/elykia-client/pom.xml -s $GITHUB_WORKSPACE/settings.xml || echo "Deployment failed, likely because version already exists. Continuing..."
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mobile:
    needs: changes
    if: ${{ needs.changes.outputs.mobile == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mobile
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'mobile/package-lock.json'
        
    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Clean npm cache
      run: npm cache clean --force
      
    - name: Install dependencies
      run: npm install --legacy-peer-deps
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium
      
    - name: Install Ionic CLI
      run: npm install -g @ionic/cli
      
    - name: Install Capacitor CLI
      run: npm install -g @capacitor/cli

    - name: Run E2E Tests
      run: npm run test:e2e
      
    - name: Build Ionic app
      run: |
        ionic build --prod
      
    - name: Add Android platform
      run: |
        npx cap add android
        
    - name: Create google-services.json
      run: |
        echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json    
        
    - name: Configure Gradle for Crashlytics
      run: |
        # 1. Ajouter le classpath dans build.gradle (racine)
        sed -i "/dependencies {/a \        classpath 'com.google.gms:google-services:4.4.0'\n        classpath 'com.google.firebase:firebase-crashlytics-gradle:2.9.9'" android/build.gradle
        
        # 2. Appliquer les plugins dans app/build.gradle
        sed -i "/apply plugin: 'com.android.application'/a apply plugin: 'com.google.gms.google-services'\napply plugin: 'com.google.firebase.crashlytics'" android/app/build.gradle
        
        # 3. Ajouter les dépendances Firebase dans app/build.gradle
        sed -i "/dependencies {/a \    implementation platform('com.google.firebase:firebase-bom:32.7.0')\n    implementation 'com.google.firebase:firebase-crashlytics'\n    implementation 'com.google.firebase:firebase-analytics'" android/app/build.gradle    

    - name: Debug google-services.json
      run: |
        cat android/app/google-services.json
        python -m json.tool android/app/google-services.json

    - name: Sync Capacitor
      run: |
        npx cap sync android

    - name: Prepare Android Configuration
      run: |
        echo "=== Preparing Android configuration files ==="
        mkdir -p android/app/src/main/res/xml
        echo "Configuration files ready for post-sync copy"

    - name: Final Capacitor Sync
      run: |
        echo "=== Final sync after configuration ==="
        npx cap sync android
        
        echo "=== Capacitor sync completed, now re-applying our configurations ==="
        
        # Re-copier nos fichiers APRÈS le sync qui les a écrasés
        echo "Re-copying AndroidManifest.xml (simplified version) after sync..."
        cp .github/workflows/android-config/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
        
        echo "Re-copying config.xml after sync..."
        cp .github/workflows/android-config/config.xml android/app/src/main/res/xml/config.xml
        
        echo "Re-copying network_security_config.xml after sync..."
        cp .github/workflows/android-config/network_security_config.xml android/app/src/main/res/xml/network_security_config.xml
        
        echo "Re-copying file_paths.xml after sync..."
        cp .github/workflows/android-config/file_paths.xml android/app/src/main/res/xml/file_paths.xml
        
        echo "=== Final verification after re-copy ==="
        echo "Checking permissions count:"
        grep -c "uses-permission" android/app/src/main/AndroidManifest.xml || echo "No permissions found!"
        
        echo "Checking application tag:"
        grep -A 5 "usesCleartextTraffic" android/app/src/main/AndroidManifest.xml || echo "No cleartext traffic config found!"

    - name: Grant execute permission for gradlew
      run: |
        chmod +x android/gradlew
      
    - name: Build Android Debug APK
      run: |
        cd android
        ./gradlew assembleDebug
      
    - name: Extract App Version and Rename APK
      run: |
        VERSION=$(grep "version:" src/environments/environment.ts | sed "s/.*version: '\([^']*\)'.*/\1/")
        echo "Detected version: $VERSION"
        echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
        mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/elykia-mobile-v$VERSION.apk

    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: elykia-mobile-v${{ env.APP_VERSION }}.apk
        path: mobile/android/app/build/outputs/apk/debug/elykia-mobile-v${{ env.APP_VERSION }}.apk
        retention-days: ${{ github.ref == 'refs/heads/main' && 90 || 10 }}
