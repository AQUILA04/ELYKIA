name: ELYKIA CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      backend_lib: ${{ steps.filter.outputs.backend_lib }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
    - uses: actions/checkout@v4
    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          frontend:
            - 'frontend/**'
          backend:
            - 'backend/**'
          backend_lib:
            - 'backend-lib/**'
          mobile:
            - 'mobile/**'

  build-frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '14'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Install dependencies
      run: npm install

    - name: Build
      run: npm run build

  build-backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        server-id: github
        settings-path: ${{ github.workspace }}

    # Build dependencies in order before building backend
    - name: Build common-entities-dependencies
      run: mvn -B clean install -DskipTests --file backend-lib/common-entities-dependencies/pom.xml

    - name: Build common-security-service
      run: mvn -B clean install -DskipTests --file backend-lib/common-security-service/pom.xml

    - name: Build optimize-elykia-client
      run: mvn -B clean install -DskipTests --file backend-lib/optimize-elykia-client/pom.xml

    - name: Build and Deploy Backend
      run: mvn -B deploy -DskipTests --file backend/pom.xml -s $GITHUB_WORKSPACE/settings.xml
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-backend-lib:
    needs: changes
    if: ${{ needs.changes.outputs.backend_lib == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        server-id: github
        settings-path: ${{ github.workspace }}

    - name: Build and Deploy common-entities-dependencies
      run: mvn -B deploy -DskipTests --file backend-lib/common-entities-dependencies/pom.xml -s $GITHUB_WORKSPACE/settings.xml
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Deploy common-security-service
      run: mvn -B deploy -DskipTests --file backend-lib/common-security-service/pom.xml -s $GITHUB_WORKSPACE/settings.xml
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Deploy optimize-elykia-client
      run: mvn -B deploy -DskipTests --file backend-lib/optimize-elykia-client/pom.xml -s $GITHUB_WORKSPACE/settings.xml
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mobile:
    needs: changes
    if: ${{ needs.changes.outputs.mobile == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mobile
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'mobile/package-lock.json'
        
    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Clean npm cache
      run: npm cache clean --force
      
    - name: Install dependencies
      run: npm install --legacy-peer-deps
      
    - name: Install Ionic CLI
      run: npm install -g @ionic/cli
      
    - name: Install Capacitor CLI
      run: npm install -g @capacitor/cli
      
    - name: Build Ionic app
      run: |
        ionic build --prod
      
    - name: Add Android platform
      run: |
        npx cap add android
        
    - name: Sync Capacitor
      run: |
        npx cap sync android

    - name: Grant execute permission for gradlew
      run: |
        chmod +x android/gradlew
      
    - name: Build Android Debug APK
      run: |
        cd android
        ./gradlew assembleDebug
      
    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: elykia-mobile-debug-apk
        path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: ${{ github.ref == 'refs/heads/main' && 90 || 10 }}
