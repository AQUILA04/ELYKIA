name: ELYKIA CD Pipeline

# This workflow runs after the CI workflow ("ELYKIA CI Pipeline") completes successfully.
# It deploys to 'test' when CI ran on branch 'main', and to 'prod' when CI ran on branches matching 'prod/**'.
# It also supports a manual 'promote' workflow_dispatch to promote the current test release to prod.

on:
  workflow_run:
    workflows: ["ELYKIA CI Pipeline"]
    types: [completed]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform (promote)'
        required: true
        default: 'promote'

jobs:
  deploy-test:
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    name: Deploy to TEST after CI
    steps:
    - name: Prepare SSH key
      run: |
        echo "$SSH_PRIVATE_KEY" > private_key
        chmod 600 private_key
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Deploy to test server
      run: |
        REPO='${{ github.repository }}'
        SHA='${{ github.event.workflow_run.head_sha }}'
        FRONTEND_IMAGE="ghcr.io/$REPO-frontend:$SHA"
        BACKEND_IMAGE="ghcr.io/$REPO-backend:$SHA"
        echo "Deploying $FRONTEND_IMAGE and $BACKEND_IMAGE to test"
        ssh -o StrictHostKeyChecking=no -i private_key ${{ secrets.TEST_SERVER_USER }}@${{ secrets.TEST_SERVER_HOST }} "export GHCR_USERNAME='${{ secrets.GHCR_USERNAME }}' GHCR_TOKEN='${{ secrets.GHCR_TOKEN }}' && cd ${{ secrets.TEST_DEPLOY_PATH }} && ./deploy/deploy.sh test '$FRONTEND_IMAGE' '$BACKEND_IMAGE'"

    - name: Cleanup SSH key
      run: rm -f private_key || true

  deploy-prod:
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_branch, 'prod/')
    runs-on: ubuntu-latest
    name: Deploy to PROD after CI
    steps:
    - name: Prepare SSH key
      run: |
        echo "$SSH_PRIVATE_KEY" > private_key
        chmod 600 private_key
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Deploy to prod server
      run: |
        REPO='${{ github.repository }}'
        SHA='${{ github.event.workflow_run.head_sha }}'
        FRONTEND_IMAGE="ghcr.io/$REPO-frontend:$SHA"
        BACKEND_IMAGE="ghcr.io/$REPO-backend:$SHA"
        echo "Deploying $FRONTEND_IMAGE and $BACKEND_IMAGE to prod"
        ssh -o StrictHostKeyChecking=no -i private_key ${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_HOST }} "export GHCR_USERNAME='${{ secrets.GHCR_USERNAME }}' GHCR_TOKEN='${{ secrets.GHCR_TOKEN }}' && cd ${{ secrets.PROD_DEPLOY_PATH }} && ./deploy/deploy.sh prod '$FRONTEND_IMAGE' '$BACKEND_IMAGE'"

    - name: Cleanup SSH key
      run: rm -f private_key || true

  promote:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'promote'
    runs-on: ubuntu-latest
    name: Promote test -> prod
    steps:
    - name: Prepare SSH key
      run: |
        echo "$SSH_PRIVATE_KEY" > private_key
        chmod 600 private_key
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Promote current test release to prod
      run: |
        set -euo pipefail
        TEST_HOST=${{ secrets.TEST_SERVER_HOST }}
        TEST_USER=${{ secrets.TEST_SERVER_USER }}
        TEST_PATH=${{ secrets.TEST_DEPLOY_PATH }}
        PROD_HOST=${{ secrets.PROD_SERVER_HOST }}
        PROD_USER=${{ secrets.PROD_SERVER_USER }}
        PROD_PATH=${{ secrets.PROD_DEPLOY_PATH }}

        echo "Fetching current test release file"
        ssh -o StrictHostKeyChecking=no -i private_key "$TEST_USER@$TEST_HOST" "cat $TEST_PATH/releases/test_current.txt" > release.txt
        cat release.txt
        FRONTEND_IMAGE=$(grep '^FRONTEND_IMAGE=' release.txt | cut -d= -f2-)
        BACKEND_IMAGE=$(grep '^BACKEND_IMAGE=' release.txt | cut -d= -f2-)

        if [ -z "$FRONTEND_IMAGE" ] || [ -z "$BACKEND_IMAGE" ]; then
          echo "Could not determine images to promote" >&2
          exit 2
        fi

        echo "Promoting FRONTEND_IMAGE=$FRONTEND_IMAGE BACKEND_IMAGE=$BACKEND_IMAGE to prod ($PROD_HOST)"
        ssh -o StrictHostKeyChecking=no -i private_key "$PROD_USER@$PROD_HOST" "export GHCR_USERNAME='${{ secrets.GHCR_USERNAME }}' GHCR_TOKEN='${{ secrets.GHCR_TOKEN }}' && cd $PROD_PATH && ./deploy/deploy.sh prod '$FRONTEND_IMAGE' '$BACKEND_IMAGE'"

    - name: Cleanup
      run: rm -f private_key release.txt || true


