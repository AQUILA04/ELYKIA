<ion-header>
  <ion-toolbar>
    <ion-title>Sélectionner {{ getEntityTypeLabel() }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()">Fermer</ion-button>
    </ion-buttons>
  </ion-toolbar>
  <ion-toolbar>
    <ion-searchbar
      placeholder="Rechercher..."
      [value]="searchTerm$ | async"
      (ionInput)="onSearchChange($event)"
      [debounce]="300">
    </ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="loading-container" *ngIf="(loading$ | async) && ((parents$ | async)?.length === 0)">
    <ion-spinner name="crescent"></ion-spinner>
    <p>Chargement...</p>
  </div>

  <ion-list *ngIf="(parents$ | async) as parents">
    <ion-item
      *ngFor="let parent of parents"
      button
      (click)="selectParent(parent)"
      [color]="selectedParentId === parent.id ? 'light' : ''">
      <ion-icon
        [name]="selectedParentId === parent.id ? 'radio-button-on' : 'radio-button-off'"
        slot="start"
        [color]="selectedParentId === parent.id ? 'primary' : 'medium'">
      </ion-icon>
      <ion-label>
        <h2>{{ getParentName(parent) }}</h2>
        <p>{{ getParentDetails(parent) }}</p>
      </ion-label>
      <ion-icon name="checkmark-circle" slot="end" color="success" *ngIf="selectedParentId === parent.id"></ion-icon>
    </ion-item>

    <div class="empty-state" *ngIf="parents.length === 0 && !(loading$ | async)">
      <p>Aucun résultat trouvé.</p>
    </div>
  </ion-list>

  <ion-infinite-scroll threshold="100px" (ionInfinite)="loadMore($event)" [disabled]="!((pagination$ | async)?.hasMore)">
    <ion-infinite-scroll-content loadingSpinner="bubbles" loadingText="Chargement plus de données...">
    </ion-infinite-scroll-content>
  </ion-infinite-scroll>
</ion-content>

<ion-footer>
  <ion-toolbar>
    <ion-button expand="block" (click)="validate()" [disabled]="!selectedParentId">
      Valider la sélection
    </ion-button>
  </ion-toolbar>
</ion-footer>
