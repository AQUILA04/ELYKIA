<ion-list>
  <ion-item (click)="edit()" [button]="true" [disabled]="editDisabled">
    <ion-icon name="create-outline" slot="start"></ion-icon>
    <ion-label>Modifier le client</ion-label>
  </ion-item>
  <ion-item (click)="delete()" [button]="true" [disabled]="deleteDisabled">
    <ion-icon name="trash-outline" slot="start"></ion-icon>
    <ion-label>Supprimer le client</ion-label>
  </ion-item>
  <ion-item (click)="editBalance()" [button]="true">
    <ion-icon name="cash-outline" slot="start"></ion-icon>
    <ion-label>Modifier le solde</ion-label>
  </ion-item>
  <ion-item (click)="updateLocation()" [button]="true" [disabled]="updateLocationDisabled">
    <ion-icon name="location-outline" slot="start"></ion-icon>
    <ion-label>Modifier la localisation</ion-label>
  </ion-item>
  <ion-item (click)="updatePhoto()" [button]="true" [disabled]="updatePhotoDisabled">
    <ion-icon name="camera-outline" slot="start"></ion-icon>
    <ion-label>Modifier une photo</ion-label>
  </ion-item>
</ion-list>
