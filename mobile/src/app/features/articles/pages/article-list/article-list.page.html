<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/more"></ion-back-button>
    </ion-buttons>
    <ion-title>Articles</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <!-- Section Articles Disponibles -->
  <div class="articles-section">
    <div class="section-header">
      <ion-icon name="cube" class="section-icon"></ion-icon>
      <span class="section-title">Articles Disponibles</span>
      <span class="articles-count">{{ articleCount$ | async }} articles</span>
    </div>

    <!-- Search Container -->
    <div class="search-container">
      <ion-searchbar
        placeholder="Rechercher par nom, référence..."
        (ionInput)="onSearchInput($event)"
        debounce="300">
      </ion-searchbar>
    </div>

    <div class="articles-list">
      <!-- Remplacement du virtual scroll par une boucle *ngFor -->
      <ion-card
        *ngFor="let article of displayedArticles; trackBy: trackByArticleId"
        class="article-card">
        <ion-card-content>
          <div class="article-content">
            <div class="article-info">
              <h3 class="article-name">{{ article.commercialName || article.name }}</h3>
              <p class="article-details">{{ article.type }} • {{ article.marque }}</p>
              <p class="stock-info">Stock disponible: {{ article.stockQuantity }} unités</p>
              <div class="price-info">
                <span class="unit-price">{{ article.creditSalePrice | number:'1.0-0' }} FCFA</span>
              </div>
            </div>
          </div>
        </ion-card-content>
      </ion-card>

      <!-- Ajout de l'infinite scroll -->
      <ion-infinite-scroll (ionInfinite)="loadMoreData($event)" [disabled]="isInfiniteScrollDisabled">
        <ion-infinite-scroll-content loadingSpinner="bubbles" loadingText="Chargement...">
        </ion-infinite-scroll-content>
      </ion-infinite-scroll>
    </div>
  </div>
</ion-content>
