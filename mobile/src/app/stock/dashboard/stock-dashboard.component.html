<ion-header>
  <ion-toolbar>
    <ion-title>Stock Dashboard</ion-title>
  </ion-toolbar>
  <ion-toolbar>
    <ion-segment
      id="stock-context-segment"
      [value]="context$ | async"
      (ionChange)="onContextChange($event)">
      <ion-segment-button value="STANDARD" id="segment-btn-standard">
        <ion-label>Standard</ion-label>
      </ion-segment-button>
      <ion-segment-button value="TONTINE" id="segment-btn-tontine">
        <ion-label>Tontine</ion-label>
      </ion-segment-button>
    </ion-segment>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ng-container *ngIf="context$ | async as currentContext">
    <!-- RequestListComponent receives context, data, and loading state from container -->
    <app-request-list
      [context]="currentContext"
      [requests]="requests"
      [loading]="loading">
    </app-request-list>
  </ng-container>
</ion-content>
