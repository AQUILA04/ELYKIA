<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EC001 - Connexion | Commercial App</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Styles spécifiques à l'écran de connexion */
        .login-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-variant));
        }

        .login-header {
            height: 30%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-on-primary);
            text-align: center;
            padding: var(--spacing-sections);
        }

        .app-logo {
            width: 120px;
            height: 120px;
            background: var(--surface-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: var(--primary-color);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            margin-bottom: var(--margin-external);
            animation: logoFloat 3s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .app-title {
            font-size: var(--font-size-h2);
            font-weight: bold;
            margin-bottom: var(--spacing-elements);
        }

        .app-subtitle {
            font-size: var(--font-size-body);
            opacity: 0.7;
        }

        .login-form-container {
            height: 50%;
            padding: 0 var(--spacing-sections);
            display: flex;
            align-items: center;
        }

        .login-form {
            width: 100%;
            background: var(--surface-color);
            border-radius: 12px;
            padding: var(--spacing-sections);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            animation: slideUpFade 0.6s ease-out;
        }

        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .password-toggle {
            position: absolute;
            right: var(--margin-internal);
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .password-toggle:hover {
            color: var(--primary-color);
        }

        .connection-status {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: var(--margin-external);
            font-size: var(--font-size-caption);
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: var(--spacing-elements);
            animation: pulse 2s infinite;
        }

        .status-online {
            background-color: var(--success-color);
        }

        .status-offline {
            background-color: var(--warning-color);
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .login-footer {
            height: 20%;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: var(--spacing-sections);
        }

        .version-info {
            color: rgba(255, 255, 255, 0.7);
            font-size: var(--font-size-caption);
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(25, 118, 210, 0.9);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }

        .loading-content {
            text-align: center;
            color: var(--text-on-primary);
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid var(--text-on-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto var(--margin-external);
        }

        .error-message {
            background-color: rgba(244, 67, 54, 0.1);
            color: var(--error-color);
            padding: var(--margin-internal);
            border-radius: var(--border-radius);
            margin-top: var(--margin-internal);
            border-left: 4px solid var(--error-color);
            font-size: var(--font-size-secondary);
            display: none;
        }

        .input-error {
            border-color: var(--error-color) !important;
        }

        .btn-login {
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .btn-login:hover::before {
            left: 100%;
        }
    </style>
</head>
<body>
    <div class="mobile-container">
        <div class="login-container">
            <!-- Header avec logo et titre -->
            <div class="login-header">
                <div class="app-logo">
                    📱
                </div>
                <div class="app-title">Commercial App</div>
                <div class="app-subtitle">Gestion Mobile</div>
            </div>

            <!-- Zone de connexion -->
            <div class="login-form-container">
                <form class="login-form" id="loginForm">
                    <!-- Champ nom d'utilisateur -->
                    <div class="input-group">
                        <label class="input-label" for="username">Nom d'utilisateur *</label>
                        <div class="input-with-icon">
                            <div class="input-icon">👤</div>
                            <input 
                                type="text" 
                                id="username" 
                                class="input-field" 
                                placeholder="Saisissez votre nom d'utilisateur"
                                required
                            >
                        </div>
                    </div>

                    <!-- Champ mot de passe -->
                    <div class="input-group">
                        <label class="input-label" for="password">Mot de passe *</label>
                        <div class="input-with-icon">
                            <div class="input-icon">🔒</div>
                            <input 
                                type="password" 
                                id="password" 
                                class="input-field" 
                                placeholder="Saisissez votre mot de passe"
                                required
                            >
                            <button type="button" class="password-toggle" onclick="togglePassword()">
                                👁️
                            </button>
                        </div>
                    </div>

                    <!-- Message d'erreur -->
                    <div class="error-message" id="errorMessage">
                        Nom d'utilisateur ou mot de passe incorrect
                    </div>

                    <!-- Bouton de connexion -->
                    <button type="submit" class="btn btn-primary btn-full-width btn-login">
                        SE CONNECTER
                    </button>

                    <!-- Statut de connexion -->
                    <div class="connection-status">
                        <div class="status-indicator status-online" id="statusIndicator"></div>
                        <span id="statusText">Connecté</span>
                    </div>
                </form>
            </div>

            <!-- Footer avec version -->
            <div class="login-footer">
                <div class="version-info">Version 1.0.0</div>
            </div>
        </div>

        <!-- Overlay de chargement -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-content">
                <div class="loading-spinner"></div>
                <div style="font-size: var(--font-size-body); font-weight: 500;">
                    Connexion en cours...
                </div>
                <div style="font-size: var(--font-size-secondary); opacity: 0.8; margin-top: 8px;">
                    Veuillez patienter
                </div>
            </div>
        </div>
    </div>

    <script>
        // Variables globales
        let isOnline = navigator.onLine;
        let passwordVisible = false;

        // Initialisation
        document.addEventListener('DOMContentLoaded', function() {
            updateConnectionStatus();
            
            // Écouter les changements de statut réseau
            window.addEventListener('online', updateConnectionStatus);
            window.addEventListener('offline', updateConnectionStatus);
            
            // Animation d'entrée
            document.querySelector('.login-form').style.animation = 'slideUpFade 0.6s ease-out';
        });

        // Gestion du formulaire de connexion
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            
            // Validation basique
            if (!username || !password) {
                showError('Veuillez remplir tous les champs');
                return;
            }
            
            // Simulation de la connexion
            showLoading();
            
            // Simuler un délai de connexion
            setTimeout(() => {
                if (isOnline) {
                    // Simulation d'authentification en ligne
                    if (username === 'demo' && password === 'demo123') {
                        hideLoading();
                        showSuccess();
                        setTimeout(() => {
                            // Redirection vers le tableau de bord
                            window.location.href = 'EC003-tableau-de-bord.html';
                        }, 1500);
                    } else {
                        hideLoading();
                        showError('Identifiants incorrects');
                    }
                } else {
                    // Simulation d'authentification hors ligne
                    const storedUser = localStorage.getItem('offlineUser');
                    if (storedUser) {
                        const userData = JSON.parse(storedUser);
                        if (userData.username === username && userData.password === password) {
                            hideLoading();
                            showSuccess();
                            setTimeout(() => {
                                window.location.href = 'EC003-tableau-de-bord.html';
                            }, 1500);
                        } else {
                            hideLoading();
                            showError('Nom d\'utilisateur ou mot de passe incorrect');
                        }
                    } else {
                        hideLoading();
                        showError('Utilisateur non configuré pour cet appareil !');
                    }
                }
            }, 2000);
        });

        // Fonction pour basculer la visibilité du mot de passe
        function togglePassword() {
            const passwordField = document.getElementById('password');
            const toggleButton = document.querySelector('.password-toggle');
            
            passwordVisible = !passwordVisible;
            passwordField.type = passwordVisible ? 'text' : 'password';
            toggleButton.textContent = passwordVisible ? '🙈' : '👁️';
        }

        // Fonction pour mettre à jour le statut de connexion
        function updateConnectionStatus() {
            isOnline = navigator.onLine;
            const indicator = document.getElementById('statusIndicator');
            const statusText = document.getElementById('statusText');
            
            if (isOnline) {
                indicator.className = 'status-indicator status-online';
                statusText.textContent = 'Connecté';
            } else {
                indicator.className = 'status-indicator status-offline';
                statusText.textContent = 'Hors ligne';
            }
        }

        // Fonction pour afficher le chargement
        function showLoading() {
            document.getElementById('loadingOverlay').style.display = 'flex';
        }

        // Fonction pour masquer le chargement
        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        // Fonction pour afficher une erreur
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            const usernameField = document.getElementById('username');
            const passwordField = document.getElementById('password');
            
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            
            // Ajouter la classe d'erreur aux champs
            usernameField.classList.add('input-error');
            passwordField.classList.add('input-error');
            
            // Animation de secousse
            errorDiv.style.animation = 'shake 0.5s ease-in-out';
            
            // Retirer l'erreur après 5 secondes
            setTimeout(() => {
                errorDiv.style.display = 'none';
                usernameField.classList.remove('input-error');
                passwordField.classList.remove('input-error');
            }, 5000);
        }

        // Fonction pour afficher le succès
        function showSuccess() {
            const form = document.querySelector('.login-form');
            form.style.background = 'linear-gradient(135deg, #4CAF50, #45a049)';
            form.style.color = 'white';
            
            const button = document.querySelector('.btn-login');
            button.innerHTML = '✓ Connexion réussie';
            button.style.background = 'rgba(255, 255, 255, 0.2)';
        }

        // Animation de secousse pour les erreurs
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-5px); }
                75% { transform: translateX(5px); }
            }
        `;
        document.head.appendChild(style);

        // Stockage d'un utilisateur demo pour les tests hors ligne
        if (!localStorage.getItem('offlineUser')) {
            localStorage.setItem('offlineUser', JSON.stringify({
                username: 'demo',
                password: 'demo123',
                email: 'demo@commercial.app'
            }));
        }
    </script>
</body>
</html>
